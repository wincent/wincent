# Base24 Everforest Light (Hard)
# Scheme author: Márcio Sobel (https://github.com/marciosobel)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#829181,bg=#f8f5e4"

# default window title colors
set-window-option -g window-status-style "fg=#829181,bg=#f8f5e4"

# active window title colors
set-window-option -g window-status-current-style "fg=#dfa000,bg=#f8f5e4"

# pane border
set-option -g pane-border-style "fg=#f8f5e4"
set-option -g pane-active-border-style "fg=#829181"

# message text
set-option -g message-style "fg=#414b50,bg=#edeada"

# pane number display
set-option -g display-panes-active-colour "#829181"
set-option -g display-panes-colour "#f8f5e4"

# clock
set-window-option -g clock-mode-colour "#3a94c5"

# copy mode highlight
set-window-option -g mode-style "fg=#829181,bg=#edeada"

# bell
set-window-option -g window-status-bell-style "fg=#fffbef,bg=#f85552"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#5c6a72,bg=#f8f5e4"

# style for command messages
set-option -g message-command-style "fg=#414b50,bg=#edeada"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#5c6a72,bg=#fffbef"
  set-window-option -g window-style "fg=#5c6a72,bg=#f8f5e4"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#5c6a72,bg=#939f91] #S #[fg=#939f91,bg=#f8f5e4,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#edeada,bg=#f8f5e4 nobold, nounderscore, noitalics]#[fg=#829181,bg=#edeada] %Y-%m-%d  %H:%M #[fg=#5c6a72,bg=#edeada,nobold,noitalics,nounderscore]#[fg=#f8f5e4,bg=#5c6a72] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f8f5e4,bg=#dfa000,nobold,noitalics,nounderscore]#[fg=#edeada,bg=#dfa000] #I #[fg=#edeada,bg=#dfa000,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#dfa000,bg=#f8f5e4,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f8f5e4,bg=#edeada,noitalics]#[fg=#414b50,bg=#edeada] #I #[fg=#414b50,bg=#edeada] #W#{?window_zoomed_flag,*Z,}} #[fg=#edeada,bg=#f8f5e4,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
