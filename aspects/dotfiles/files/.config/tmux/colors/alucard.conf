# Base24 Alucard
# Scheme author: clach04 (https://github.com/clach04)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#4c4a3d,bg=#ceccc0"

# default window title colors
set-window-option -g window-status-style "fg=#4c4a3d,bg=#ceccc0"

# active window title colors
set-window-option -g window-status-current-style "fg=#9e841a,bg=#ceccc0"

# pane border
set-option -g pane-border-style "fg=#ceccc0"
set-option -g pane-active-border-style "fg=#4c4a3d"

# message text
set-option -g message-style "fg=#1f1f1f,bg=#cfcfde"

# pane number display
set-option -g display-panes-active-colour "#4c4a3d"
set-option -g display-panes-colour "#ceccc0"

# clock
set-window-option -g clock-mode-colour "#644ac9"

# copy mode highlight
set-window-option -g mode-style "fg=#4c4a3d,bg=#cfcfde"

# bell
set-window-option -g window-status-bell-style "fg=#fffbeb,bg=#cb3a2a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#1f1f1f,bg=#ceccc0"

# style for command messages
set-option -g message-command-style "fg=#1f1f1f,bg=#cfcfde"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#1f1f1f,bg=#fffbeb"
  set-window-option -g window-style "fg=#1f1f1f,bg=#ceccc0"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#1f1f1f,bg=#6c664b] #S #[fg=#6c664b,bg=#ceccc0,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#cfcfde,bg=#ceccc0 nobold, nounderscore, noitalics]#[fg=#4c4a3d,bg=#cfcfde] %Y-%m-%d  %H:%M #[fg=#1f1f1f,bg=#cfcfde,nobold,noitalics,nounderscore]#[fg=#ceccc0,bg=#1f1f1f] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#ceccc0,bg=#846e15,nobold,noitalics,nounderscore]#[fg=#cfcfde,bg=#846e15] #I #[fg=#cfcfde,bg=#846e15,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#846e15,bg=#ceccc0,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#ceccc0,bg=#cfcfde,noitalics]#[fg=#1f1f1f,bg=#cfcfde] #I #[fg=#1f1f1f,bg=#cfcfde] #W#{?window_zoomed_flag,*Z,}} #[fg=#cfcfde,bg=#ceccc0,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
