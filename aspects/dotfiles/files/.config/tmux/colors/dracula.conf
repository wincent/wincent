# Base24 Dracula
# Scheme author: clach04 (https://github.com/clach04)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#9ea8c7,bg=#21222c"

# default window title colors
set-window-option -g window-status-style "fg=#9ea8c7,bg=#21222c"

# active window title colors
set-window-option -g window-status-current-style "fg=#ffffa5,bg=#21222c"

# pane border
set-option -g pane-border-style "fg=#21222c"
set-option -g pane-active-border-style "fg=#9ea8c7"

# message text
set-option -g message-style "fg=#f8f8f2,bg=#44475A"

# pane number display
set-option -g display-panes-active-colour "#9ea8c7"
set-option -g display-panes-colour "#21222c"

# clock
set-window-option -g clock-mode-colour "#bd93f9"

# copy mode highlight
set-window-option -g mode-style "fg=#9ea8c7,bg=#44475A"

# bell
set-window-option -g window-status-bell-style "fg=#282a36,bg=#ff5555"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#f8f8f2,bg=#21222c"

# style for command messages
set-option -g message-command-style "fg=#f8f8f2,bg=#44475A"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#f8f8f2,bg=#282a36"
  set-window-option -g window-style "fg=#f8f8f2,bg=#21222c"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#f8f8f2,bg=#6272a4] #S #[fg=#6272a4,bg=#21222c,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#44475A,bg=#21222c nobold, nounderscore, noitalics]#[fg=#9ea8c7,bg=#44475A] %Y-%m-%d  %H:%M #[fg=#f8f8f2,bg=#44475A,nobold,noitalics,nounderscore]#[fg=#21222c,bg=#f8f8f2] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#21222c,bg=#f1fa8c,nobold,noitalics,nounderscore]#[fg=#44475A,bg=#f1fa8c] #I #[fg=#44475A,bg=#f1fa8c,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#f1fa8c,bg=#21222c,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#21222c,bg=#44475A,noitalics]#[fg=#f8f8f2,bg=#44475A] #I #[fg=#f8f8f2,bg=#44475A] #W#{?window_zoomed_flag,*Z,}} #[fg=#44475A,bg=#21222c,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
