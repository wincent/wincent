# Base24 Cacao
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#AF9B8B,bg=#241913"

# default window title colors
set-window-option -g window-status-style "fg=#AF9B8B,bg=#241913"

# active window title colors
set-window-option -g window-status-current-style "fg=#E8A84A,bg=#241913"

# pane border
set-option -g pane-border-style "fg=#241913"
set-option -g pane-active-border-style "fg=#AF9B8B"

# message text
set-option -g message-style "fg=#EEDECD,bg=#3A281E"

# pane number display
set-option -g display-panes-active-colour "#AF9B8B"
set-option -g display-panes-colour "#241913"

# clock
set-window-option -g clock-mode-colour "#A89AD0"

# copy mode highlight
set-window-option -g mode-style "fg=#AF9B8B,bg=#3A281E"

# bell
set-window-option -g window-status-bell-style "fg=#160F0C,bg=#E0705C"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#E8D6C4,bg=#241913"

# style for command messages
set-option -g message-command-style "fg=#EEDECD,bg=#3A281E"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#E8D6C4,bg=#160F0C"
  set-window-option -g window-style "fg=#E8D6C4,bg=#241913"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#E8D6C4,bg=#766052] #S #[fg=#766052,bg=#241913,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#3A281E,bg=#241913 nobold, nounderscore, noitalics]#[fg=#AF9B8B,bg=#3A281E] %Y-%m-%d  %H:%M #[fg=#E8D6C4,bg=#3A281E,nobold,noitalics,nounderscore]#[fg=#241913,bg=#E8D6C4] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#241913,bg=#E8A84A,nobold,noitalics,nounderscore]#[fg=#3A281E,bg=#E8A84A] #I #[fg=#3A281E,bg=#E8A84A,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#E8A84A,bg=#241913,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#241913,bg=#3A281E,noitalics]#[fg=#EEDECD,bg=#3A281E] #I #[fg=#EEDECD,bg=#3A281E] #W#{?window_zoomed_flag,*Z,}} #[fg=#3A281E,bg=#241913,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
