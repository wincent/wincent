# Base24 Papel
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#6A5D4B,bg=#8E8576"

# default window title colors
set-window-option -g window-status-style "fg=#6A5D4B,bg=#8E8576"

# active window title colors
set-window-option -g window-status-current-style "fg=#A8761A,bg=#8E8576"

# pane border
set-option -g pane-border-style "fg=#8E8576"
set-option -g pane-active-border-style "fg=#6A5D4B"

# message text
set-option -g message-style "fg=#958B7C,bg=#E0D0AC"

# pane number display
set-option -g display-panes-active-colour "#6A5D4B"
set-option -g display-panes-colour "#8E8576"

# clock
set-window-option -g clock-mode-colour "#2C6CA0"

# copy mode highlight
set-window-option -g mode-style "fg=#6A5D4B,bg=#E0D0AC"

# bell
set-window-option -g window-status-bell-style "fg=#F5EFE2,bg=#C0392B"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#3A2E20,bg=#8E8576"

# style for command messages
set-option -g message-command-style "fg=#958B7C,bg=#E0D0AC"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#3A2E20,bg=#F5EFE2"
  set-window-option -g window-style "fg=#3A2E20,bg=#8E8576"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#3A2E20,bg=#9A8C76] #S #[fg=#9A8C76,bg=#8E8576,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#E0D0AC,bg=#8E8576 nobold, nounderscore, noitalics]#[fg=#6A5D4B,bg=#E0D0AC] %Y-%m-%d  %H:%M #[fg=#3A2E20,bg=#E0D0AC,nobold,noitalics,nounderscore]#[fg=#8E8576,bg=#3A2E20] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#8E8576,bg=#A8761A,nobold,noitalics,nounderscore]#[fg=#E0D0AC,bg=#A8761A] #I #[fg=#E0D0AC,bg=#A8761A,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#A8761A,bg=#8E8576,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#8E8576,bg=#E0D0AC,noitalics]#[fg=#958B7C,bg=#E0D0AC] #I #[fg=#958B7C,bg=#E0D0AC] #W#{?window_zoomed_flag,*Z,}} #[fg=#E0D0AC,bg=#8E8576,noitalics]"
  set-window-option -g window-status-separator ""
}

