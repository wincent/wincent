# Base24 Embers Light
# Scheme author: Jannik Siebert (https://github.com/janniks)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#5a5047,bg=#beb6ae"

# default window title colors
set-window-option -g window-status-style "fg=#5a5047,bg=#beb6ae"

# active window title colors
set-window-option -g window-status-current-style "fg=#6d8257,bg=#beb6ae"

# pane border
set-option -g pane-border-style "fg=#beb6ae"
set-option -g pane-active-border-style "fg=#5a5047"

# message text
set-option -g message-style "fg=#2c2620,bg=#a39a90"

# pane number display
set-option -g display-panes-active-colour "#5a5047"
set-option -g display-panes-colour "#beb6ae"

# clock
set-window-option -g clock-mode-colour "#6d5782"

# copy mode highlight
set-window-option -g mode-style "fg=#5a5047,bg=#a39a90"

# bell
set-window-option -g window-status-bell-style "fg=#dbd6d1,bg=#826d57"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#433b32,bg=#beb6ae"

# style for command messages
set-option -g message-command-style "fg=#2c2620,bg=#a39a90"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#433b32,bg=#dbd6d1"
  set-window-option -g window-style "fg=#433b32,bg=#beb6ae"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#433b32,bg=#8a8075] #S #[fg=#8a8075,bg=#beb6ae,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#a39a90,bg=#beb6ae nobold, nounderscore, noitalics]#[fg=#5a5047,bg=#a39a90] %Y-%m-%d  %H:%M #[fg=#433b32,bg=#a39a90,nobold,noitalics,nounderscore]#[fg=#beb6ae,bg=#433b32] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#beb6ae,bg=#6d8257,nobold,noitalics,nounderscore]#[fg=#a39a90,bg=#6d8257] #I #[fg=#a39a90,bg=#6d8257,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#6d8257,bg=#beb6ae,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#beb6ae,bg=#a39a90,noitalics]#[fg=#2c2620,bg=#a39a90] #I #[fg=#2c2620,bg=#a39a90] #W#{?window_zoomed_flag,*Z,}} #[fg=#a39a90,bg=#beb6ae,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
