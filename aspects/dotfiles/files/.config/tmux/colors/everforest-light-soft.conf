# Base24 Everforest Light (Soft)
# Scheme author: Márcio Sobel (https://github.com/marciosobel)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#829181,bg=#eae4ca"

# default window title colors
set-window-option -g window-status-style "fg=#829181,bg=#eae4ca"

# active window title colors
set-window-option -g window-status-current-style "fg=#dfa000,bg=#eae4ca"

# pane border
set-option -g pane-border-style "fg=#eae4ca"
set-option -g pane-active-border-style "fg=#829181"

# message text
set-option -g message-style "fg=#4d5960,bg=#ddd8be"

# pane number display
set-option -g display-panes-active-colour "#829181"
set-option -g display-panes-colour "#eae4ca"

# clock
set-window-option -g clock-mode-colour "#3a94c5"

# copy mode highlight
set-window-option -g mode-style "fg=#829181,bg=#ddd8be"

# bell
set-window-option -g window-status-bell-style "fg=#f3ead3,bg=#f85552"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#5c6a72,bg=#eae4ca"

# style for command messages
set-option -g message-command-style "fg=#4d5960,bg=#ddd8be"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#5c6a72,bg=#f3ead3"
  set-window-option -g window-style "fg=#5c6a72,bg=#eae4ca"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#5c6a72,bg=#939f91] #S #[fg=#939f91,bg=#eae4ca,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#ddd8be,bg=#eae4ca nobold, nounderscore, noitalics]#[fg=#829181,bg=#ddd8be] %Y-%m-%d  %H:%M #[fg=#5c6a72,bg=#ddd8be,nobold,noitalics,nounderscore]#[fg=#eae4ca,bg=#5c6a72] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#eae4ca,bg=#dfa000,nobold,noitalics,nounderscore]#[fg=#ddd8be,bg=#dfa000] #I #[fg=#ddd8be,bg=#dfa000,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#dfa000,bg=#eae4ca,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#eae4ca,bg=#ddd8be,noitalics]#[fg=#4d5960,bg=#ddd8be] #I #[fg=#4d5960,bg=#ddd8be] #W#{?window_zoomed_flag,*Z,}} #[fg=#ddd8be,bg=#eae4ca,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
