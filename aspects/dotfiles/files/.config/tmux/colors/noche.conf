# Base24 Noche
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#939BB2,bg=#181C2C"

# default window title colors
set-window-option -g window-status-style "fg=#939BB2,bg=#181C2C"

# active window title colors
set-window-option -g window-status-current-style "fg=#D8C062,bg=#181C2C"

# pane border
set-option -g pane-border-style "fg=#181C2C"
set-option -g pane-active-border-style "fg=#939BB2"

# message text
set-option -g message-style "fg=#D9E0F3,bg=#232A40"

# pane number display
set-option -g display-panes-active-colour "#939BB2"
set-option -g display-panes-colour "#181C2C"

# clock
set-window-option -g clock-mode-colour "#7AA0E8"

# copy mode highlight
set-window-option -g mode-style "fg=#939BB2,bg=#232A40"

# bell
set-window-option -g window-status-bell-style "fg=#0C0E16,bg=#E2727E"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#CBD4EC,bg=#181C2C"

# style for command messages
set-option -g message-command-style "fg=#D9E0F3,bg=#232A40"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#CBD4EC,bg=#0C0E16"
  set-window-option -g window-style "fg=#CBD4EC,bg=#181C2C"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#CBD4EC,bg=#5A6178] #S #[fg=#5A6178,bg=#181C2C,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#232A40,bg=#181C2C nobold, nounderscore, noitalics]#[fg=#939BB2,bg=#232A40] %Y-%m-%d  %H:%M #[fg=#CBD4EC,bg=#232A40,nobold,noitalics,nounderscore]#[fg=#181C2C,bg=#CBD4EC] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#181C2C,bg=#D8C062,nobold,noitalics,nounderscore]#[fg=#232A40,bg=#D8C062] #I #[fg=#232A40,bg=#D8C062,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#D8C062,bg=#181C2C,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#181C2C,bg=#232A40,noitalics]#[fg=#D9E0F3,bg=#232A40] #I #[fg=#D9E0F3,bg=#232A40] #W#{?window_zoomed_flag,*Z,}} #[fg=#232A40,bg=#181C2C,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
