# Base24 Kissa Latte
# Scheme author: rwendell (https://github.com/rwendell/kissa)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#746C62,bg=#E8E7E3"

# default window title colors
set-window-option -g window-status-style "fg=#746C62,bg=#E8E7E3"

# active window title colors
set-window-option -g window-status-current-style "fg=#7D6820,bg=#E8E7E3"

# pane border
set-option -g pane-border-style "fg=#E8E7E3"
set-option -g pane-active-border-style "fg=#746C62"

# message text
set-option -g message-style "fg=#6E6459,bg=#D5D2CB"

# pane number display
set-option -g display-panes-active-colour "#746C62"
set-option -g display-panes-colour "#E8E7E3"

# clock
set-window-option -g clock-mode-colour "#3468A8"

# copy mode highlight
set-window-option -g mode-style "fg=#746C62,bg=#D5D2CB"

# bell
set-window-option -g window-status-bell-style "fg=#F5F4F0,bg=#9E3E3E"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#1F1C16,bg=#E8E7E3"

# style for command messages
set-option -g message-command-style "fg=#6E6459,bg=#D5D2CB"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#1F1C16,bg=#F5F4F0"
  set-window-option -g window-style "fg=#1F1C16,bg=#E8E7E3"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#1F1C16,bg=#91887D] #S #[fg=#91887D,bg=#E8E7E3,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#D5D2CB,bg=#E8E7E3 nobold, nounderscore, noitalics]#[fg=#746C62,bg=#D5D2CB] %Y-%m-%d  %H:%M #[fg=#1F1C16,bg=#D5D2CB,nobold,noitalics,nounderscore]#[fg=#E8E7E3,bg=#1F1C16] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#E8E7E3,bg=#7D6820,nobold,noitalics,nounderscore]#[fg=#D5D2CB,bg=#7D6820] #I #[fg=#D5D2CB,bg=#7D6820,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#7D6820,bg=#E8E7E3,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#E8E7E3,bg=#D5D2CB,noitalics]#[fg=#6E6459,bg=#D5D2CB] #I #[fg=#6E6459,bg=#D5D2CB] #W#{?window_zoomed_flag,*Z,}} #[fg=#D5D2CB,bg=#E8E7E3,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
