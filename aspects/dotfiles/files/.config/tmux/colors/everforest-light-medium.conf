# Base24 Everforest Light (Medium)
# Scheme author: Márcio Sobel (https://github.com/marciosobel)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#829181,bg=#f4f0d9"

# default window title colors
set-window-option -g window-status-style "fg=#829181,bg=#f4f0d9"

# active window title colors
set-window-option -g window-status-current-style "fg=#dfa000,bg=#f4f0d9"

# pane border
set-option -g pane-border-style "fg=#f4f0d9"
set-option -g pane-active-border-style "fg=#829181"

# message text
set-option -g message-style "fg=#475258,bg=#e6e2cc"

# pane number display
set-option -g display-panes-active-colour "#829181"
set-option -g display-panes-colour "#f4f0d9"

# clock
set-window-option -g clock-mode-colour "#3a94c5"

# copy mode highlight
set-window-option -g mode-style "fg=#829181,bg=#e6e2cc"

# bell
set-window-option -g window-status-bell-style "fg=#fdf6e3,bg=#f85552"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#5c6a72,bg=#f4f0d9"

# style for command messages
set-option -g message-command-style "fg=#475258,bg=#e6e2cc"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#5c6a72,bg=#fdf6e3"
  set-window-option -g window-style "fg=#5c6a72,bg=#f4f0d9"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#5c6a72,bg=#939f91] #S #[fg=#939f91,bg=#f4f0d9,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#e6e2cc,bg=#f4f0d9 nobold, nounderscore, noitalics]#[fg=#829181,bg=#e6e2cc] %Y-%m-%d  %H:%M #[fg=#5c6a72,bg=#e6e2cc,nobold,noitalics,nounderscore]#[fg=#f4f0d9,bg=#5c6a72] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f4f0d9,bg=#dfa000,nobold,noitalics,nounderscore]#[fg=#e6e2cc,bg=#dfa000] #I #[fg=#e6e2cc,bg=#dfa000,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#dfa000,bg=#f4f0d9,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f4f0d9,bg=#e6e2cc,noitalics]#[fg=#475258,bg=#e6e2cc] #I #[fg=#475258,bg=#e6e2cc] #W#{?window_zoomed_flag,*Z,}} #[fg=#e6e2cc,bg=#f4f0d9,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
