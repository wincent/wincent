# Base24 Bosque
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#96AA98,bg=#16211A"

# default window title colors
set-window-option -g window-status-style "fg=#96AA98,bg=#16211A"

# active window title colors
set-window-option -g window-status-current-style "fg=#C8B84A,bg=#16211A"

# pane border
set-option -g pane-border-style "fg=#16211A"
set-option -g pane-active-border-style "fg=#96AA98"

# message text
set-option -g message-style "fg=#DAEBDA,bg=#1E3023"

# pane number display
set-option -g display-panes-active-colour "#96AA98"
set-option -g display-panes-colour "#16211A"

# clock
set-window-option -g clock-mode-colour "#6DAE9E"

# copy mode highlight
set-window-option -g mode-style "fg=#96AA98,bg=#1E3023"

# bell
set-window-option -g window-status-bell-style "fg=#0E1410,bg=#E2706A"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#CFE5D2,bg=#16211A"

# style for command messages
set-option -g message-command-style "fg=#DAEBDA,bg=#1E3023"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#CFE5D2,bg=#0E1410"
  set-window-option -g window-style "fg=#CFE5D2,bg=#16211A"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#CFE5D2,bg=#5C6E5E] #S #[fg=#5C6E5E,bg=#16211A,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#1E3023,bg=#16211A nobold, nounderscore, noitalics]#[fg=#96AA98,bg=#1E3023] %Y-%m-%d  %H:%M #[fg=#CFE5D2,bg=#1E3023,nobold,noitalics,nounderscore]#[fg=#16211A,bg=#CFE5D2] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#16211A,bg=#C8B84A,nobold,noitalics,nounderscore]#[fg=#1E3023,bg=#C8B84A] #I #[fg=#1E3023,bg=#C8B84A,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#C8B84A,bg=#16211A,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#16211A,bg=#1E3023,noitalics]#[fg=#DAEBDA,bg=#1E3023] #I #[fg=#DAEBDA,bg=#1E3023] #W#{?window_zoomed_flag,*Z,}} #[fg=#1E3023,bg=#16211A,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
