# kitty open-actions: route clicks on file:// hyperlinks to nvim, via the
# nvim-open script that ships with the shannon nvim plugin.
#
# nvim-open parses the URL, detects ssh in the active tmux pane (forwarding
# over ssh if appropriate), finds the sibling-pane nvim, and dispatches
# through shannon's private.open RPC.
#
# The @active-kitty-window-id placeholder is substituted by kitty at click-
# dispatch time and pins the click-source window deterministically — without
# it, nvim-open has to fall back to a `state:focused` query that races kitty's
# own focus-update bookkeeping. Placeholders are only substituted when an
# argv token matches exactly, so it must be its own positional argument.
#
# Re-read on every click — edits take effect immediately, no kitty restart.

protocol file
action launch --type=background ~/.config/nvim/pack/bundle/opt/shannon/bin/nvim-open ${URL} @active-kitty-window-id
