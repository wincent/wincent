# Tinted8 Nord
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#e5e9f0,bg=#2e3440"

# default window title colors
set-window-option -g window-status-style "fg=#e5e9f0,bg=#2e3440"

# active window title colors
set-window-option -g window-status-current-style "fg=#ebcb8b,bg=#2e3440"

# pane border
set-option -g pane-border-style "fg=#"
set-option -g pane-active-border-style "fg=#"

# message text
set-option -g message-style "fg=#eceff4,bg=#465165"

# pane number display
set-option -g display-panes-active-colour "#"
set-option -g display-panes-colour "#465165"

# clock
set-window-option -g clock-mode-colour "#81a1c1"

# copy mode highlight
set-window-option -g mode-style "fg=#d8dee9,bg=#465165"

# bell
set-window-option -g window-status-bell-style "fg=#2e3440,bg=#bf616a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#e5e9f0,bg=#2e3440"

# style for command messages
set-option -g message-command-style "fg=#eceff4,bg=#465165"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#e5e9f0,bg=#2e3440"
  set-window-option -g window-style "fg=#e5e9f0,bg=#14171d"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#e5e9f0,bg=#465165] #S #[fg=#465165,bg=#2e3440,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#465165,bg=#2e3440 nobold, nounderscore, noitalics]#[fg=#d8dee9,bg=#465165] %Y-%m-%d  %H:%M #[fg=#e5e9f0,bg=#465165,nobold,noitalics,nounderscore]#[fg=#2e3440,bg=#e5e9f0] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#2e3440,bg=#ebcb8b,nobold,noitalics,nounderscore]#[fg=#465165,bg=#ebcb8b] #I #[fg=#465165,bg=#ebcb8b,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#ebcb8b,bg=#2e3440,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#2e3440,bg=#465165,noitalics]#[fg=#eceff4,bg=#465165] #I #[fg=#eceff4,bg=#465165] #W#{?window_zoomed_flag,*Z,} #[fg=#465165,bg=#2e3440,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
