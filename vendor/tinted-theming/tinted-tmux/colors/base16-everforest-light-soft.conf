# Base16 Everforest Light (Soft)
# Scheme author: Márcio Sobel (https://github.com/marciosobel)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#5c6a72,bg=#f3ead3"

# default window title colors
set-window-option -g window-status-style "fg=#5c6a72,bg=#f3ead3"

# active window title colors
set-window-option -g window-status-current-style "fg=#dfa000,bg=#f3ead3"

# pane border
set-option -g pane-border-style "fg=#eae4ca"
set-option -g pane-active-border-style "fg=#829181"

# message text
set-option -g message-style "fg=#4d5960,bg=#eae4ca"

# pane number display
set-option -g display-panes-active-colour "#829181"
set-option -g display-panes-colour "#eae4ca"

# clock
set-window-option -g clock-mode-colour "#3a94c5"

# copy mode highlight
set-window-option -g mode-style "fg=#829181,bg=#eae4ca"

# bell
set-window-option -g window-status-bell-style "fg=#f3ead3,bg=#f85552"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#5c6a72,bg=#f3ead3"

# style for command messages
set-option -g message-command-style "fg=#4d5960,bg=#eae4ca"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#5c6a72,bg=#f3ead3"
  set-window-option -g window-style "fg=#5c6a72,bg=#f3ead3"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#5c6a72,bg=#ddd8be] #S #[fg=#ddd8be,bg=#f3ead3,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#eae4ca,bg=#f3ead3 nobold, nounderscore, noitalics]#[fg=#829181,bg=#eae4ca] %Y-%m-%d  %H:%M #[fg=#5c6a72,bg=#eae4ca,nobold,noitalics,nounderscore]#[fg=#f3ead3,bg=#5c6a72] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f3ead3,bg=#dfa000,nobold,noitalics,nounderscore]#[fg=#eae4ca,bg=#dfa000] #I #[fg=#eae4ca,bg=#dfa000,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#dfa000,bg=#f3ead3,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f3ead3,bg=#eae4ca,noitalics]#[fg=#4d5960,bg=#eae4ca] #I #[fg=#4d5960,bg=#eae4ca] #W#{?window_zoomed_flag,*Z,} #[fg=#eae4ca,bg=#f3ead3,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
