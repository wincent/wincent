# Base16 Github Light High Contrast
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#343b43,bg=#ffffff"

# default window title colors
set-window-option -g window-status-style "fg=#343b43,bg=#ffffff"

# active window title colors
set-window-option -g window-status-current-style "fg=#956400,bg=#ffffff"

# pane border
set-option -g pane-border-style "fg=#e7ecf0"
set-option -g pane-active-border-style "fg=#66707b"

# message text
set-option -g message-style "fg=#20252c,bg=#e7ecf0"

# pane number display
set-option -g display-panes-active-colour "#66707b"
set-option -g display-panes-colour "#e7ecf0"

# clock
set-window-option -g clock-mode-colour "#622cbc"

# copy mode highlight
set-window-option -g mode-style "fg=#66707b,bg=#e7ecf0"

# bell
set-window-option -g window-status-bell-style "fg=#ffffff,bg=#702c00"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#343b43,bg=#ffffff"

# style for command messages
set-option -g message-command-style "fg=#20252c,bg=#e7ecf0"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#343b43,bg=#ffffff"
  set-window-option -g window-style "fg=#343b43,bg=#ffffff"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#343b43,bg=#acb6c0] #S #[fg=#acb6c0,bg=#ffffff,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#e7ecf0,bg=#ffffff nobold, nounderscore, noitalics]#[fg=#66707b,bg=#e7ecf0] %Y-%m-%d  %H:%M #[fg=#343b43,bg=#e7ecf0,nobold,noitalics,nounderscore]#[fg=#ffffff,bg=#343b43] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#ffffff,bg=#956400,nobold,noitalics,nounderscore]#[fg=#e7ecf0,bg=#956400] #I #[fg=#e7ecf0,bg=#956400,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#956400,bg=#ffffff,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#ffffff,bg=#e7ecf0,noitalics]#[fg=#20252c,bg=#e7ecf0] #I #[fg=#20252c,bg=#e7ecf0] #W#{?window_zoomed_flag,*Z,} #[fg=#e7ecf0,bg=#ffffff,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
