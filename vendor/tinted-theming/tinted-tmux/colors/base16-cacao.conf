# Base16 Cacao
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#e8d6c4,bg=#160f0c"

# default window title colors
set-window-option -g window-status-style "fg=#e8d6c4,bg=#160f0c"

# active window title colors
set-window-option -g window-status-current-style "fg=#e8a84a,bg=#160f0c"

# pane border
set-option -g pane-border-style "fg=#241913"
set-option -g pane-active-border-style "fg=#af9b8b"

# message text
set-option -g message-style "fg=#eedecd,bg=#241913"

# pane number display
set-option -g display-panes-active-colour "#af9b8b"
set-option -g display-panes-colour "#241913"

# clock
set-window-option -g clock-mode-colour "#a89ad0"

# copy mode highlight
set-window-option -g mode-style "fg=#af9b8b,bg=#241913"

# bell
set-window-option -g window-status-bell-style "fg=#160f0c,bg=#e0705c"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#e8d6c4,bg=#160f0c"

# style for command messages
set-option -g message-command-style "fg=#eedecd,bg=#241913"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#e8d6c4,bg=#160f0c"
  set-window-option -g window-style "fg=#e8d6c4,bg=#160f0c"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#e8d6c4,bg=#3a281e] #S #[fg=#3a281e,bg=#160f0c,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#241913,bg=#160f0c nobold, nounderscore, noitalics]#[fg=#af9b8b,bg=#241913] %Y-%m-%d  %H:%M #[fg=#e8d6c4,bg=#241913,nobold,noitalics,nounderscore]#[fg=#160f0c,bg=#e8d6c4] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#160f0c,bg=#e8a84a,nobold,noitalics,nounderscore]#[fg=#241913,bg=#e8a84a] #I #[fg=#241913,bg=#e8a84a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#e8a84a,bg=#160f0c,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#160f0c,bg=#241913,noitalics]#[fg=#eedecd,bg=#241913] #I #[fg=#eedecd,bg=#241913] #W#{?window_zoomed_flag,*Z,} #[fg=#241913,bg=#160f0c,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
