# Base16 boo-shnickle-light
# Scheme author: boo-shnickle (@boo_shnickle)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#5b5b49,bg=#ffffcc"

# default window title colors
set-window-option -g window-status-style "fg=#5b5b49,bg=#ffffcc"

# active window title colors
set-window-option -g window-status-current-style "fg=#fff299,bg=#ffffcc"

# pane border
set-option -g pane-border-style "fg=#dedeb2"
set-option -g pane-active-border-style "fg=#7c7c63"

# message text
set-option -g message-style "fg=#3a3a2e,bg=#dedeb2"

# pane number display
set-option -g display-panes-active-colour "#7c7c63"
set-option -g display-panes-colour "#dedeb2"

# clock
set-window-option -g clock-mode-colour "#bfbfd9"

# copy mode highlight
set-window-option -g mode-style "fg=#7c7c63,bg=#dedeb2"

# bell
set-window-option -g window-status-bell-style "fg=#ffffcc,bg=#ffbfa5"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#5b5b49,bg=#ffffcc"

# style for command messages
set-option -g message-command-style "fg=#3a3a2e,bg=#dedeb2"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#5b5b49,bg=#ffffcc"
  set-window-option -g window-style "fg=#5b5b49,bg=#ffffcc"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#5b5b49,bg=#bdbd97] #S #[fg=#bdbd97,bg=#ffffcc,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#dedeb2,bg=#ffffcc nobold, nounderscore, noitalics]#[fg=#7c7c63,bg=#dedeb2] %Y-%m-%d  %H:%M #[fg=#5b5b49,bg=#dedeb2,nobold,noitalics,nounderscore]#[fg=#ffffcc,bg=#5b5b49] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#ffffcc,bg=#fff299,nobold,noitalics,nounderscore]#[fg=#dedeb2,bg=#fff299] #I #[fg=#dedeb2,bg=#fff299,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#fff299,bg=#ffffcc,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#ffffcc,bg=#dedeb2,noitalics]#[fg=#3a3a2e,bg=#dedeb2] #I #[fg=#3a3a2e,bg=#dedeb2] #W#{?window_zoomed_flag,*Z,} #[fg=#dedeb2,bg=#ffffcc,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
