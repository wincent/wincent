# Base16 Github Dark High Contrast
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#f0f3f6,bg=#0a0c10"

# default window title colors
set-window-option -g window-status-style "fg=#f0f3f6,bg=#0a0c10"

# active window title colors
set-window-option -g window-status-current-style "fg=#e09b13,bg=#0a0c10"

# pane border
set-option -g pane-border-style "fg=#272b33"
set-option -g pane-active-border-style "fg=#bdc4cc"

# message text
set-option -g message-style "fg=#ffffff,bg=#272b33"

# pane number display
set-option -g display-panes-active-colour "#bdc4cc"
set-option -g display-panes-colour "#272b33"

# clock
set-window-option -g clock-mode-colour "#dbb7ff"

# copy mode highlight
set-window-option -g mode-style "fg=#bdc4cc,bg=#272b33"

# bell
set-window-option -g window-status-bell-style "fg=#0a0c10,bg=#ffb757"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#f0f3f6,bg=#0a0c10"

# style for command messages
set-option -g message-command-style "fg=#ffffff,bg=#272b33"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#f0f3f6,bg=#0a0c10"
  set-window-option -g window-style "fg=#f0f3f6,bg=#0a0c10"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#f0f3f6,bg=#7a828e] #S #[fg=#7a828e,bg=#0a0c10,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#272b33,bg=#0a0c10 nobold, nounderscore, noitalics]#[fg=#bdc4cc,bg=#272b33] %Y-%m-%d  %H:%M #[fg=#f0f3f6,bg=#272b33,nobold,noitalics,nounderscore]#[fg=#0a0c10,bg=#f0f3f6] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#0a0c10,bg=#e09b13,nobold,noitalics,nounderscore]#[fg=#272b33,bg=#e09b13] #I #[fg=#272b33,bg=#e09b13,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#e09b13,bg=#0a0c10,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#0a0c10,bg=#272b33,noitalics]#[fg=#ffffff,bg=#272b33] #I #[fg=#ffffff,bg=#272b33] #W#{?window_zoomed_flag,*Z,} #[fg=#272b33,bg=#0a0c10,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
