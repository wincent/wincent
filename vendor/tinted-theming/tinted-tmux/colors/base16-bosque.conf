# Base16 Bosque
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#cfe5d2,bg=#0e1410"

# default window title colors
set-window-option -g window-status-style "fg=#cfe5d2,bg=#0e1410"

# active window title colors
set-window-option -g window-status-current-style "fg=#c8b84a,bg=#0e1410"

# pane border
set-option -g pane-border-style "fg=#16211a"
set-option -g pane-active-border-style "fg=#96aa98"

# message text
set-option -g message-style "fg=#daebda,bg=#16211a"

# pane number display
set-option -g display-panes-active-colour "#96aa98"
set-option -g display-panes-colour "#16211a"

# clock
set-window-option -g clock-mode-colour "#6dae9e"

# copy mode highlight
set-window-option -g mode-style "fg=#96aa98,bg=#16211a"

# bell
set-window-option -g window-status-bell-style "fg=#0e1410,bg=#e2706a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#cfe5d2,bg=#0e1410"

# style for command messages
set-option -g message-command-style "fg=#daebda,bg=#16211a"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#cfe5d2,bg=#0e1410"
  set-window-option -g window-style "fg=#cfe5d2,bg=#0e1410"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#cfe5d2,bg=#1e3023] #S #[fg=#1e3023,bg=#0e1410,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#16211a,bg=#0e1410 nobold, nounderscore, noitalics]#[fg=#96aa98,bg=#16211a] %Y-%m-%d  %H:%M #[fg=#cfe5d2,bg=#16211a,nobold,noitalics,nounderscore]#[fg=#0e1410,bg=#cfe5d2] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#0e1410,bg=#c8b84a,nobold,noitalics,nounderscore]#[fg=#16211a,bg=#c8b84a] #I #[fg=#16211a,bg=#c8b84a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#c8b84a,bg=#0e1410,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#0e1410,bg=#16211a,noitalics]#[fg=#daebda,bg=#16211a] #I #[fg=#daebda,bg=#16211a] #W#{?window_zoomed_flag,*Z,} #[fg=#16211a,bg=#0e1410,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
