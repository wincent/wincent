# Tinted8 Catppuccin Mocha
# Scheme author: https://github.com/catppuccin/catppuccin
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#cdd6f4,bg=#1e1e2e"

# default window title colors
set-window-option -g window-status-style "fg=#cdd6f4,bg=#1e1e2e"

# active window title colors
set-window-option -g window-status-current-style "fg=#f9e2af,bg=#1e1e2e"

# pane border
set-option -g pane-border-style "fg=#"
set-option -g pane-active-border-style "fg=#"

# message text
set-option -g message-style "fg=#ffffff,bg=#353554"

# pane number display
set-option -g display-panes-active-colour "#"
set-option -g display-panes-colour "#353554"

# clock
set-window-option -g clock-mode-colour "#89b4fa"

# copy mode highlight
set-window-option -g mode-style "fg=#97abed,bg=#353554"

# bell
set-window-option -g window-status-bell-style "fg=#1e1e2e,bg=#f38ba8"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#cdd6f4,bg=#1e1e2e"

# style for command messages
set-option -g message-command-style "fg=#ffffff,bg=#353554"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#cdd6f4,bg=#1e1e2e"
  set-window-option -g window-style "fg=#cdd6f4,bg=#181825"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#cdd6f4,bg=#353554] #S #[fg=#353554,bg=#1e1e2e,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#353554,bg=#1e1e2e nobold, nounderscore, noitalics]#[fg=#97abed,bg=#353554] %Y-%m-%d  %H:%M #[fg=#cdd6f4,bg=#353554,nobold,noitalics,nounderscore]#[fg=#1e1e2e,bg=#cdd6f4] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#1e1e2e,bg=#f9e2af,nobold,noitalics,nounderscore]#[fg=#353554,bg=#f9e2af] #I #[fg=#353554,bg=#f9e2af,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#f9e2af,bg=#1e1e2e,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#1e1e2e,bg=#353554,noitalics]#[fg=#ffffff,bg=#353554] #I #[fg=#ffffff,bg=#353554] #W#{?window_zoomed_flag,*Z,} #[fg=#353554,bg=#1e1e2e,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
