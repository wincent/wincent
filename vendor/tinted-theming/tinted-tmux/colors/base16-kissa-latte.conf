# Base16 Kissa Latte
# Scheme author: rwendell (https://github.com/rwendell/kissa)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#1f1c16,bg=#f5f4f0"

# default window title colors
set-window-option -g window-status-style "fg=#1f1c16,bg=#f5f4f0"

# active window title colors
set-window-option -g window-status-current-style "fg=#7d6820,bg=#f5f4f0"

# pane border
set-option -g pane-border-style "fg=#e8e7e3"
set-option -g pane-active-border-style "fg=#746c62"

# message text
set-option -g message-style "fg=#6e6459,bg=#e8e7e3"

# pane number display
set-option -g display-panes-active-colour "#746c62"
set-option -g display-panes-colour "#e8e7e3"

# clock
set-window-option -g clock-mode-colour "#3468a8"

# copy mode highlight
set-window-option -g mode-style "fg=#746c62,bg=#e8e7e3"

# bell
set-window-option -g window-status-bell-style "fg=#f5f4f0,bg=#9e3e3e"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#1f1c16,bg=#f5f4f0"

# style for command messages
set-option -g message-command-style "fg=#6e6459,bg=#e8e7e3"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#1f1c16,bg=#f5f4f0"
  set-window-option -g window-style "fg=#1f1c16,bg=#f5f4f0"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#1f1c16,bg=#d5d2cb] #S #[fg=#d5d2cb,bg=#f5f4f0,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#e8e7e3,bg=#f5f4f0 nobold, nounderscore, noitalics]#[fg=#746c62,bg=#e8e7e3] %Y-%m-%d  %H:%M #[fg=#1f1c16,bg=#e8e7e3,nobold,noitalics,nounderscore]#[fg=#f5f4f0,bg=#1f1c16] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f5f4f0,bg=#7d6820,nobold,noitalics,nounderscore]#[fg=#e8e7e3,bg=#7d6820] #I #[fg=#e8e7e3,bg=#7d6820,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#7d6820,bg=#f5f4f0,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f5f4f0,bg=#e8e7e3,noitalics]#[fg=#6e6459,bg=#e8e7e3] #I #[fg=#6e6459,bg=#e8e7e3] #W#{?window_zoomed_flag,*Z,} #[fg=#e8e7e3,bg=#f5f4f0,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
