# Base16 Swamp Light
# Scheme author: Masroof Maindak (https://github.com/masroof-maindak)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#64513e,bg=#f1e3d1"

# default window title colors
set-window-option -g window-status-style "fg=#64513e,bg=#f1e3d1"

# active window title colors
set-window-option -g window-status-current-style "fg=#993333,bg=#f1e3d1"

# pane border
set-option -g pane-border-style "fg=#ddcebc"
set-option -g pane-active-border-style "fg=#a0907d"

# message text
set-option -g message-style "fg=#786653,bg=#ddcebc"

# pane number display
set-option -g display-panes-active-colour "#a0907d"
set-option -g display-panes-colour "#ddcebc"

# clock
set-window-option -g clock-mode-colour "#bf7979"

# copy mode highlight
set-window-option -g mode-style "fg=#a0907d,bg=#ddcebc"

# bell
set-window-option -g window-status-bell-style "fg=#f1e3d1,bg=#d09700"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#64513e,bg=#f1e3d1"

# style for command messages
set-option -g message-command-style "fg=#786653,bg=#ddcebc"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#64513e,bg=#f1e3d1"
  set-window-option -g window-style "fg=#64513e,bg=#f1e3d1"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#64513e,bg=#c9b9a7] #S #[fg=#c9b9a7,bg=#f1e3d1,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#ddcebc,bg=#f1e3d1 nobold, nounderscore, noitalics]#[fg=#a0907d,bg=#ddcebc] %Y-%m-%d  %H:%M #[fg=#64513e,bg=#ddcebc,nobold,noitalics,nounderscore]#[fg=#f1e3d1,bg=#64513e] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f1e3d1,bg=#993333,nobold,noitalics,nounderscore]#[fg=#ddcebc,bg=#993333] #I #[fg=#ddcebc,bg=#993333,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#993333,bg=#f1e3d1,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f1e3d1,bg=#ddcebc,noitalics]#[fg=#786653,bg=#ddcebc] #I #[fg=#786653,bg=#ddcebc] #W#{?window_zoomed_flag,*Z,} #[fg=#ddcebc,bg=#f1e3d1,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
