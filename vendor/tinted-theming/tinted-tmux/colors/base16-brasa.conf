# Base16 Brasa
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#f0d8c0,bg=#1a0f0a"

# default window title colors
set-window-option -g window-status-style "fg=#f0d8c0,bg=#1a0f0a"

# active window title colors
set-window-option -g window-status-current-style "fg=#f0b23a,bg=#1a0f0a"

# pane border
set-option -g pane-border-style "fg=#2b1c14"
set-option -g pane-active-border-style "fg=#b59d88"

# message text
set-option -g message-style "fg=#f6e1cc,bg=#2b1c14"

# pane number display
set-option -g display-panes-active-colour "#b59d88"
set-option -g display-panes-colour "#2b1c14"

# clock
set-window-option -g clock-mode-colour "#9aa6e0"

# copy mode highlight
set-window-option -g mode-style "fg=#b59d88,bg=#2b1c14"

# bell
set-window-option -g window-status-bell-style "fg=#1a0f0a,bg=#f2685a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#f0d8c0,bg=#1a0f0a"

# style for command messages
set-option -g message-command-style "fg=#f6e1cc,bg=#2b1c14"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#f0d8c0,bg=#1a0f0a"
  set-window-option -g window-style "fg=#f0d8c0,bg=#1a0f0a"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#f0d8c0,bg=#45261a] #S #[fg=#45261a,bg=#1a0f0a,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#2b1c14,bg=#1a0f0a nobold, nounderscore, noitalics]#[fg=#b59d88,bg=#2b1c14] %Y-%m-%d  %H:%M #[fg=#f0d8c0,bg=#2b1c14,nobold,noitalics,nounderscore]#[fg=#1a0f0a,bg=#f0d8c0] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#1a0f0a,bg=#f0b23a,nobold,noitalics,nounderscore]#[fg=#2b1c14,bg=#f0b23a] #I #[fg=#2b1c14,bg=#f0b23a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#f0b23a,bg=#1a0f0a,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#1a0f0a,bg=#2b1c14,noitalics]#[fg=#f6e1cc,bg=#2b1c14] #I #[fg=#f6e1cc,bg=#2b1c14] #W#{?window_zoomed_flag,*Z,} #[fg=#2b1c14,bg=#1a0f0a,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
