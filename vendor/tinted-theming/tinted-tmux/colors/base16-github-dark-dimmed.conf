# Base16 Github Dark Dimmed
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#adbac7,bg=#22272e"

# default window title colors
set-window-option -g window-status-style "fg=#adbac7,bg=#22272e"

# active window title colors
set-window-option -g window-status-current-style "fg=#ae7c14,bg=#22272e"

# pane border
set-option -g pane-border-style "fg=#2d333b"
set-option -g pane-active-border-style "fg=#768390"

# message text
set-option -g message-style "fg=#cdd9e5,bg=#2d333b"

# pane number display
set-option -g display-panes-active-colour "#768390"
set-option -g display-panes-colour "#2d333b"

# clock
set-window-option -g clock-mode-colour "#dcbdfb"

# copy mode highlight
set-window-option -g mode-style "fg=#768390,bg=#2d333b"

# bell
set-window-option -g window-status-bell-style "fg=#22272e,bg=#f69d50"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#adbac7,bg=#22272e"

# style for command messages
set-option -g message-command-style "fg=#cdd9e5,bg=#2d333b"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#adbac7,bg=#22272e"
  set-window-option -g window-style "fg=#adbac7,bg=#22272e"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#adbac7,bg=#545d68] #S #[fg=#545d68,bg=#22272e,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#2d333b,bg=#22272e nobold, nounderscore, noitalics]#[fg=#768390,bg=#2d333b] %Y-%m-%d  %H:%M #[fg=#adbac7,bg=#2d333b,nobold,noitalics,nounderscore]#[fg=#22272e,bg=#adbac7] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#22272e,bg=#ae7c14,nobold,noitalics,nounderscore]#[fg=#2d333b,bg=#ae7c14] #I #[fg=#2d333b,bg=#ae7c14,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#ae7c14,bg=#22272e,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#22272e,bg=#2d333b,noitalics]#[fg=#cdd9e5,bg=#2d333b] #I #[fg=#cdd9e5,bg=#2d333b] #W#{?window_zoomed_flag,*Z,} #[fg=#2d333b,bg=#22272e,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
