# Base24 Github Light
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#6e7781,bg=#f6f8fa"

# default window title colors
set-window-option -g window-status-style "fg=#6e7781,bg=#f6f8fa"

# active window title colors
set-window-option -g window-status-current-style "fg=#d4a72c,bg=#f6f8fa"

# pane border
set-option -g pane-border-style "fg=#f6f8fa"
set-option -g pane-active-border-style "fg=#6e7781"

# message text
set-option -g message-style "fg=#32383f,bg=#afb8c1"

# pane number display
set-option -g display-panes-active-colour "#6e7781"
set-option -g display-panes-colour "#f6f8fa"

# clock
set-window-option -g clock-mode-colour "#8250df"

# copy mode highlight
set-window-option -g mode-style "fg=#6e7781,bg=#afb8c1"

# bell
set-window-option -g window-status-bell-style "fg=#ffffff,bg=#953800"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#424a53,bg=#f6f8fa"

# style for command messages
set-option -g message-command-style "fg=#32383f,bg=#afb8c1"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#424a53,bg=#ffffff"
  set-window-option -g window-style "fg=#424a53,bg=#f6f8fa"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#424a53,bg=#8c959f] #S #[fg=#8c959f,bg=#f6f8fa,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#afb8c1,bg=#f6f8fa nobold, nounderscore, noitalics]#[fg=#6e7781,bg=#afb8c1] %Y-%m-%d  %H:%M #[fg=#424a53,bg=#afb8c1,nobold,noitalics,nounderscore]#[fg=#f6f8fa,bg=#424a53] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f6f8fa,bg=#bf8700,nobold,noitalics,nounderscore]#[fg=#afb8c1,bg=#bf8700] #I #[fg=#afb8c1,bg=#bf8700,bold] #W#{?window_zoomed_flag,*Z,}} #[fg=#bf8700,bg=#f6f8fa,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f6f8fa,bg=#afb8c1,noitalics]#[fg=#32383f,bg=#afb8c1] #I #[fg=#32383f,bg=#afb8c1] #W#{?window_zoomed_flag,*Z,}} #[fg=#afb8c1,bg=#f6f8fa,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
