# Base16 Papel
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#3a2e20,bg=#f5efe2"

# default window title colors
set-window-option -g window-status-style "fg=#3a2e20,bg=#f5efe2"

# active window title colors
set-window-option -g window-status-current-style "fg=#a8761a,bg=#f5efe2"

# pane border
set-option -g pane-border-style "fg=#8e8576"
set-option -g pane-active-border-style "fg=#6a5d4b"

# message text
set-option -g message-style "fg=#958b7c,bg=#8e8576"

# pane number display
set-option -g display-panes-active-colour "#6a5d4b"
set-option -g display-panes-colour "#8e8576"

# clock
set-window-option -g clock-mode-colour "#2c6ca0"

# copy mode highlight
set-window-option -g mode-style "fg=#6a5d4b,bg=#8e8576"

# bell
set-window-option -g window-status-bell-style "fg=#f5efe2,bg=#c0392b"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#3a2e20,bg=#f5efe2"

# style for command messages
set-option -g message-command-style "fg=#958b7c,bg=#8e8576"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#3a2e20,bg=#f5efe2"
  set-window-option -g window-style "fg=#3a2e20,bg=#f5efe2"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#3a2e20,bg=#e0d0ac] #S #[fg=#e0d0ac,bg=#f5efe2,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#8e8576,bg=#f5efe2 nobold, nounderscore, noitalics]#[fg=#6a5d4b,bg=#8e8576] %Y-%m-%d  %H:%M #[fg=#3a2e20,bg=#8e8576,nobold,noitalics,nounderscore]#[fg=#f5efe2,bg=#3a2e20] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#f5efe2,bg=#a8761a,nobold,noitalics,nounderscore]#[fg=#8e8576,bg=#a8761a] #I #[fg=#8e8576,bg=#a8761a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#a8761a,bg=#f5efe2,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#f5efe2,bg=#8e8576,noitalics]#[fg=#958b7c,bg=#8e8576] #I #[fg=#958b7c,bg=#8e8576] #W#{?window_zoomed_flag,*Z,} #[fg=#8e8576,bg=#f5efe2,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
