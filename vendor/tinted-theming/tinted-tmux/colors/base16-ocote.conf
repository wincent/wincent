# Base16 Ocote
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#e7dcc6,bg=#14100c"

# default window title colors
set-window-option -g window-status-style "fg=#e7dcc6,bg=#14100c"

# active window title colors
set-window-option -g window-status-current-style "fg=#e8b43a,bg=#14100c"

# pane border
set-option -g pane-border-style "fg=#211b13"
set-option -g pane-active-border-style "fg=#a99f8d"

# message text
set-option -g message-style "fg=#f1e9d9,bg=#211b13"

# pane number display
set-option -g display-panes-active-colour "#a99f8d"
set-option -g display-panes-colour "#211b13"

# clock
set-window-option -g clock-mode-colour "#82a6e0"

# copy mode highlight
set-window-option -g mode-style "fg=#a99f8d,bg=#211b13"

# bell
set-window-option -g window-status-bell-style "fg=#14100c,bg=#e8635a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#e7dcc6,bg=#14100c"

# style for command messages
set-option -g message-command-style "fg=#f1e9d9,bg=#211b13"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#e7dcc6,bg=#14100c"
  set-window-option -g window-style "fg=#e7dcc6,bg=#14100c"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#e7dcc6,bg=#3a2e1c] #S #[fg=#3a2e1c,bg=#14100c,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#211b13,bg=#14100c nobold, nounderscore, noitalics]#[fg=#a99f8d,bg=#211b13] %Y-%m-%d  %H:%M #[fg=#e7dcc6,bg=#211b13,nobold,noitalics,nounderscore]#[fg=#14100c,bg=#e7dcc6] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#14100c,bg=#e8b43a,nobold,noitalics,nounderscore]#[fg=#211b13,bg=#e8b43a] #I #[fg=#211b13,bg=#e8b43a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#e8b43a,bg=#14100c,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#14100c,bg=#211b13,noitalics]#[fg=#f1e9d9,bg=#211b13] #I #[fg=#f1e9d9,bg=#211b13] #W#{?window_zoomed_flag,*Z,} #[fg=#211b13,bg=#14100c,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
