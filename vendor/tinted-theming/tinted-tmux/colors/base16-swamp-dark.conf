# Base16 Swamp Dark
# Scheme author: Masroof Maindak (https://github.com/masroof-maindak)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#d2c3a4,bg=#242015"

# default window title colors
set-window-option -g window-status-style "fg=#d2c3a4,bg=#242015"

# active window title colors
set-window-option -g window-status-current-style "fg=#a82d56,bg=#242015"

# pane border
set-option -g pane-border-style "fg=#3a3124"
set-option -g pane-active-border-style "fg=#b8a58c"

# message text
set-option -g message-style "fg=#ebe0bb,bg=#3a3124"

# pane number display
set-option -g display-panes-active-colour "#b8a58c"
set-option -g display-panes-colour "#3a3124"

# clock
set-window-option -g clock-mode-colour "#c1666b"

# copy mode highlight
set-window-option -g mode-style "fg=#b8a58c,bg=#3a3124"

# bell
set-window-option -g window-status-bell-style "fg=#242015,bg=#db930d"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#d2c3a4,bg=#242015"

# style for command messages
set-option -g message-command-style "fg=#ebe0bb,bg=#3a3124"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#d2c3a4,bg=#242015"
  set-window-option -g window-style "fg=#d2c3a4,bg=#242015"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#d2c3a4,bg=#4d3f32] #S #[fg=#4d3f32,bg=#242015,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#3a3124,bg=#242015 nobold, nounderscore, noitalics]#[fg=#b8a58c,bg=#3a3124] %Y-%m-%d  %H:%M #[fg=#d2c3a4,bg=#3a3124,nobold,noitalics,nounderscore]#[fg=#242015,bg=#d2c3a4] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#242015,bg=#a82d56,nobold,noitalics,nounderscore]#[fg=#3a3124,bg=#a82d56] #I #[fg=#3a3124,bg=#a82d56,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#a82d56,bg=#242015,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#242015,bg=#3a3124,noitalics]#[fg=#ebe0bb,bg=#3a3124] #I #[fg=#ebe0bb,bg=#3a3124] #W#{?window_zoomed_flag,*Z,} #[fg=#3a3124,bg=#242015,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
