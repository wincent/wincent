# Base16 Tinta
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#d8d6d0,bg=#101012"

# default window title colors
set-window-option -g window-status-style "fg=#d8d6d0,bg=#101012"

# active window title colors
set-window-option -g window-status-current-style "fg=#c8b86a,bg=#101012"

# pane border
set-option -g pane-border-style "fg=#202023"
set-option -g pane-active-border-style "fg=#9d9c9d"

# message text
set-option -g message-style "fg=#e3e1db,bg=#202023"

# pane number display
set-option -g display-panes-active-colour "#9d9c9d"
set-option -g display-panes-colour "#202023"

# clock
set-window-option -g clock-mode-colour "#8a9ab0"

# copy mode highlight
set-window-option -g mode-style "fg=#9d9c9d,bg=#202023"

# bell
set-window-option -g window-status-bell-style "fg=#101012,bg=#d0726a"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#d8d6d0,bg=#101012"

# style for command messages
set-option -g message-command-style "fg=#e3e1db,bg=#202023"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#d8d6d0,bg=#101012"
  set-window-option -g window-style "fg=#d8d6d0,bg=#101012"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#d8d6d0,bg=#2c2c30] #S #[fg=#2c2c30,bg=#101012,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#202023,bg=#101012 nobold, nounderscore, noitalics]#[fg=#9d9c9d,bg=#202023] %Y-%m-%d  %H:%M #[fg=#d8d6d0,bg=#202023,nobold,noitalics,nounderscore]#[fg=#101012,bg=#d8d6d0] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#101012,bg=#c8b86a,nobold,noitalics,nounderscore]#[fg=#202023,bg=#c8b86a] #I #[fg=#202023,bg=#c8b86a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#c8b86a,bg=#101012,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#101012,bg=#202023,noitalics]#[fg=#e3e1db,bg=#202023] #I #[fg=#e3e1db,bg=#202023] #W#{?window_zoomed_flag,*Z,} #[fg=#202023,bg=#101012,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
