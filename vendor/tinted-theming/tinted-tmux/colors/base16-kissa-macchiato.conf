# Base16 Kissa Macchiato
# Scheme author: rwendell (https://github.com/rwendell/kissa)
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#faf0e6,bg=#1f1c16"

# default window title colors
set-window-option -g window-status-style "fg=#faf0e6,bg=#1f1c16"

# active window title colors
set-window-option -g window-status-current-style "fg=#eac67a,bg=#1f1c16"

# pane border
set-option -g pane-border-style "fg=#35322d"
set-option -g pane-active-border-style "fg=#d4c4a8"

# message text
set-option -g message-style "fg=#e8d5b7,bg=#35322d"

# pane number display
set-option -g display-panes-active-colour "#d4c4a8"
set-option -g display-panes-colour "#35322d"

# clock
set-window-option -g clock-mode-colour "#7fa8d4"

# copy mode highlight
set-window-option -g mode-style "fg=#d4c4a8,bg=#35322d"

# bell
set-window-option -g window-status-bell-style "fg=#1f1c16,bg=#e87777"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#faf0e6,bg=#1f1c16"

# style for command messages
set-option -g message-command-style "fg=#e8d5b7,bg=#35322d"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#faf0e6,bg=#1f1c16"
  set-window-option -g window-style "fg=#faf0e6,bg=#1f1c16"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#faf0e6,bg=#47443f] #S #[fg=#47443f,bg=#1f1c16,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#35322d,bg=#1f1c16 nobold, nounderscore, noitalics]#[fg=#d4c4a8,bg=#35322d] %Y-%m-%d  %H:%M #[fg=#faf0e6,bg=#35322d,nobold,noitalics,nounderscore]#[fg=#1f1c16,bg=#faf0e6] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#1f1c16,bg=#eac67a,nobold,noitalics,nounderscore]#[fg=#35322d,bg=#eac67a] #I #[fg=#35322d,bg=#eac67a,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#eac67a,bg=#1f1c16,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#1f1c16,bg=#35322d,noitalics]#[fg=#e8d5b7,bg=#35322d] #I #[fg=#e8d5b7,bg=#35322d] #W#{?window_zoomed_flag,*Z,} #[fg=#35322d,bg=#1f1c16,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
