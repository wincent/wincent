# Base16 Mezcal
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#e0d8c8,bg=#13110e"

# default window title colors
set-window-option -g window-status-style "fg=#e0d8c8,bg=#13110e"

# active window title colors
set-window-option -g window-status-current-style "fg=#d9a441,bg=#13110e"

# pane border
set-option -g pane-border-style "fg=#221f14"
set-option -g pane-active-border-style "fg=#a79e8c"

# message text
set-option -g message-style "fg=#e9e1cf,bg=#221f14"

# pane number display
set-option -g display-panes-active-colour "#a79e8c"
set-option -g display-panes-colour "#221f14"

# clock
set-window-option -g clock-mode-colour "#8aa6c0"

# copy mode highlight
set-window-option -g mode-style "fg=#a79e8c,bg=#221f14"

# bell
set-window-option -g window-status-bell-style "fg=#13110e,bg=#da6e54"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#e0d8c8,bg=#13110e"

# style for command messages
set-option -g message-command-style "fg=#e9e1cf,bg=#221f14"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#e0d8c8,bg=#13110e"
  set-window-option -g window-style "fg=#e0d8c8,bg=#13110e"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#e0d8c8,bg=#36301e] #S #[fg=#36301e,bg=#13110e,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#221f14,bg=#13110e nobold, nounderscore, noitalics]#[fg=#a79e8c,bg=#221f14] %Y-%m-%d  %H:%M #[fg=#e0d8c8,bg=#221f14,nobold,noitalics,nounderscore]#[fg=#13110e,bg=#e0d8c8] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#13110e,bg=#d9a441,nobold,noitalics,nounderscore]#[fg=#221f14,bg=#d9a441] #I #[fg=#221f14,bg=#d9a441,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#d9a441,bg=#13110e,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#13110e,bg=#221f14,noitalics]#[fg=#e9e1cf,bg=#221f14] #I #[fg=#e9e1cf,bg=#221f14] #W#{?window_zoomed_flag,*Z,} #[fg=#221f14,bg=#13110e,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
