# Base16 Noche
# Scheme author: Teshre
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#cbd4ec,bg=#0c0e16"

# default window title colors
set-window-option -g window-status-style "fg=#cbd4ec,bg=#0c0e16"

# active window title colors
set-window-option -g window-status-current-style "fg=#d8c062,bg=#0c0e16"

# pane border
set-option -g pane-border-style "fg=#181c2c"
set-option -g pane-active-border-style "fg=#939bb2"

# message text
set-option -g message-style "fg=#d9e0f3,bg=#181c2c"

# pane number display
set-option -g display-panes-active-colour "#939bb2"
set-option -g display-panes-colour "#181c2c"

# clock
set-window-option -g clock-mode-colour "#7aa0e8"

# copy mode highlight
set-window-option -g mode-style "fg=#939bb2,bg=#181c2c"

# bell
set-window-option -g window-status-bell-style "fg=#0c0e16,bg=#e2727e"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#cbd4ec,bg=#0c0e16"

# style for command messages
set-option -g message-command-style "fg=#d9e0f3,bg=#181c2c"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#cbd4ec,bg=#0c0e16"
  set-window-option -g window-style "fg=#cbd4ec,bg=#0c0e16"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#cbd4ec,bg=#232a40] #S #[fg=#232a40,bg=#0c0e16,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#181c2c,bg=#0c0e16 nobold, nounderscore, noitalics]#[fg=#939bb2,bg=#181c2c] %Y-%m-%d  %H:%M #[fg=#cbd4ec,bg=#181c2c,nobold,noitalics,nounderscore]#[fg=#0c0e16,bg=#cbd4ec] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#0c0e16,bg=#d8c062,nobold,noitalics,nounderscore]#[fg=#181c2c,bg=#d8c062] #I #[fg=#181c2c,bg=#d8c062,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#d8c062,bg=#0c0e16,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#0c0e16,bg=#181c2c,noitalics]#[fg=#d9e0f3,bg=#181c2c] #I #[fg=#d9e0f3,bg=#181c2c] #W#{?window_zoomed_flag,*Z,} #[fg=#181c2c,bg=#0c0e16,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
