# Tinted8 Catppuccin Latte
# Scheme author: https://github.com/catppuccin/catppuccin
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#4c4f69,bg=#dce0e8"

# default window title colors
set-window-option -g window-status-style "fg=#4c4f69,bg=#dce0e8"

# active window title colors
set-window-option -g window-status-current-style "fg=#df8e1d,bg=#dce0e8"

# pane border
set-option -g pane-border-style "fg=#"
set-option -g pane-active-border-style "fg=#"

# message text
set-option -g message-style "fg=#6c6f85,bg=#ffffff"

# pane number display
set-option -g display-panes-active-colour "#"
set-option -g display-panes-colour "#ffffff"

# clock
set-window-option -g clock-mode-colour "#1e66f5"

# copy mode highlight
set-window-option -g mode-style "fg=#323446,bg=#b6bfd1"

# bell
set-window-option -g window-status-bell-style "fg=#dce0e8,bg=#d20f39"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#4c4f69,bg=#dce0e8"

# style for command messages
set-option -g message-command-style "fg=#6c6f85,bg=#ffffff"

# Optional active/inactive pane state
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#4c4f69,bg=#dce0e8"
  set-window-option -g window-style "fg=#4c4f69,bg=#b6bfd1"
}

# Optional statusbar
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#4c4f69,bg=#b6bfd1] #S #[fg=#b6bfd1,bg=#dce0e8,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#ffffff,bg=#dce0e8 nobold, nounderscore, noitalics]#[fg=#323446,bg=#ffffff] %Y-%m-%d  %H:%M #[fg=#4c4f69,bg=#ffffff,nobold,noitalics,nounderscore]#[fg=#dce0e8,bg=#4c4f69] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#dce0e8,bg=#df8e1d,nobold,noitalics,nounderscore]#[fg=#ffffff,bg=#df8e1d] #I #[fg=#ffffff,bg=#df8e1d,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#df8e1d,bg=#dce0e8,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#dce0e8,bg=#ffffff,noitalics]#[fg=#6c6f85,bg=#ffffff] #I #[fg=#6c6f85,bg=#ffffff] #W#{?window_zoomed_flag,*Z,} #[fg=#ffffff,bg=#dce0e8,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
