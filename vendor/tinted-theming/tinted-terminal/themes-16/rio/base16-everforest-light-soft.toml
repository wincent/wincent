# Rio Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Everforest Light (Soft) by Márcio Sobel (https://github.com/marciosobel)

[colors]
selection-background = '#5c6a72' # base05
selection-foreground = '#ddd8be' # base02

cursor         = '#5c6a72' # base05
tabs           = '#eae4ca' # base01
tabs-active    = '#ddd8be' # base02

background     = '#f3ead3' # base00
