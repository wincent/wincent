dim-magenta      = '#c58ae0' # base0E
dim-white        = '#a99f8d' # base04

light-foreground = '#e7dcc6' # base05
light-black      = '#6b6253' # base03
light-red        = '#e8635a' # base08
light-yellow     = '#e8b43a' # base0A
light-green      = '#7dc97a' # base0B
light-cyan       = '#6dd8c8' # base0C
