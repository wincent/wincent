# Rio Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Ocote by Teshre

[colors]
selection-background = '#e7dcc6' # base05
selection-foreground = '#3a2e1c' # base02

cursor         = '#e7dcc6' # base05
tabs           = '#211b13' # base01
