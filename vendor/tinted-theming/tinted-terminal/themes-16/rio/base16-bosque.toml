# Rio Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Bosque by Teshre

[colors]
selection-background = '#cfe5d2' # base05
selection-foreground = '#1e3023' # base02

cursor         = '#cfe5d2' # base05
tabs           = '#16211a' # base01
tabs-active    = '#1e3023' # base02

background     = '#0e1410' # base00
foreground     = '#cfe5d2' # base05
black          = '#0e1410' # base00
red            = '#e2706a' # base08
yellow         = '#c8b84a' # base0A
green          = '#6fc56e' # base0B
cyan           = '#5fd0b8' # base0C
blue           = '#6dae9e' # base0D
magenta        = '#b894d0' # base0E
white          = '#cfe5d2' # base05

dim-foreground   = '#cfe5d2' # base05
dim-black        = '#16211a' # base01
dim-red          = '#e2706a' # base08
dim-yellow       = '#c8b84a' # base0A
dim-green        = '#6fc56e' # base0B
dim-cyan         = '#5fd0b8' # base0C
dim-blue         = '#6dae9e' # base0D
dim-magenta      = '#b894d0' # base0E
dim-white        = '#96aa98' # base04

light-foreground = '#cfe5d2' # base05
light-black      = '#5c6e5e' # base03
light-red        = '#e2706a' # base08
light-yellow     = '#c8b84a' # base0A
light-green      = '#6fc56e' # base0B
light-cyan       = '#5fd0b8' # base0C
light-blue       = '#6dae9e' # base0D
light-magenta    = '#b894d0' # base0E
light-white      = '#e4f0e2' # base07
