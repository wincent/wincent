# Rio Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Mezcal by Teshre

[colors]
selection-background = '#e0d8c8' # base05
selection-foreground = '#36301e' # base02

cursor         = '#e0d8c8' # base05
tabs           = '#221f14' # base01
