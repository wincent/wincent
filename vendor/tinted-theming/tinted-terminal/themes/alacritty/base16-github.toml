# base16 Github 256 - alacritty color config
# Tinted Theming (https://github.com/tinted-theming)

# Default colors
[colors.primary]
background = '0xffffff'
foreground = '0x424a53'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0xffffff'
cursor = '0x424a53'

# Normal colors
[colors.normal]
black = '0xffffff'
red = '0x953800'
green = '0x0a3069'
yellow = '0xbf8700'
blue = '0x8250df'
magenta = '0xcf222e'
cyan = '0x116329'
white = '0x424a53'

# Bright colors
[colors.bright]
black = '0x8c959f'
red = '0x953800'
