# base16 Github Dark Dimmed 256 - alacritty color config
# Tinted Theming (https://github.com/tinted-theming)

# Default colors
[colors.primary]
background = '0x22272e'
foreground = '0xadbac7'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x22272e'
cursor = '0xadbac7'

# Normal colors
