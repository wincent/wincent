# Gruvbox Dark theme for Mintty
# Scheme Author: Tinted Theming (https://github.com/tinted-theming)
# Scheme System: tinted8
# Template Author: Tinted Terminal (https://github.com/tinted-theming/tinted-terminal)

# Default colors
[colors.primary]
background = '0x282828'
foreground = '0xebdbb2'

# Colors the cursor will use if `custom_cursor_colors` is true
[colors.cursor]
text = '0x282828'
cursor = '0xebdbb2'

# Normal colors
[colors.normal]
black = '0x282828'
red = '0xcc241d'
green = '0x98971a'
yellow = '0xd79921'
blue = '0x458588'
magenta = '0xb16286'
cyan = '0x689d6a'
white = '0xebdbb2'

# Bright colors
[colors.bright]
black = '0x3c3836'
red = '0xfb4934'
green = '0xb8bb26'
yellow = '0xfabd2f'
blue = '0x83a598'
magenta = '0xd3869b'
cyan = '0x8ec07c'
white = '0xfbf1c7'
