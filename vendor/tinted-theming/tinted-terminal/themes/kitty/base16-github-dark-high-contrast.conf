# Scheme name: base16 Github Dark High Contrast
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming (https://github.com/tinted-theming/tinted-terminal)

# The basic colors
background #0a0c10
foreground #f0f3f6
selection_background #f0f3f6
selection_foreground #7a828e

# Cursor colors
cursor #f0f3f6
cursor_text_color #0a0c10

# URL underline color when hovering with mouse
url_color #bdc4cc

# Kitty window border colors
active_border_color #9ea7b3
inactive_border_color #272b33

# OS Window titlebar colors
wayland_titlebar_color #0a0c10
macos_titlebar_color #0a0c10

# Tab bar colors
active_tab_background #0a0c10
active_tab_foreground #f0f3f6
inactive_tab_background #272b33
inactive_tab_foreground #bdc4cc
tab_bar_background #272b33

# The 16 terminal colors
# normal
color0 #0a0c10
color1 #ffb757
color2 #addcff
color3 #e09b13
color4 #dbb7ff
color5 #ff9492
color6 #72f088
color7 #f0f3f6

# bright
color8 #9ea7b3
color9 #ffb757
color10 #addcff
color11 #e09b13
color12 #dbb7ff
color13 #ff9492
color14 #72f088
color15 #ffffff

# extended base16 colors
color16 #91cbff
color17 #ffb1af
