# Scheme name: base16 Kissa Latte
# Scheme author: rwendell (https://github.com/rwendell/kissa)
# Template author: Tinted Theming (https://github.com/tinted-theming/tinted-terminal)

# The basic colors
background #f5f4f0
foreground #1f1c16
selection_background #1f1c16
selection_foreground #d5d2cb

# Cursor colors
cursor #1f1c16
