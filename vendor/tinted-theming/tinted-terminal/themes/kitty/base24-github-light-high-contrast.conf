color5 #a0111f
color6 #024c1a
color7 #343b43

# bright
color8 #88929d
color9 #ee5a5d
color10 #26a148
color11 #b58407
color12 #368cf9
color13 #a371f7
color14 #49bcb7
color15 #0e1116

# extended base16 colors
color16 #023b95
