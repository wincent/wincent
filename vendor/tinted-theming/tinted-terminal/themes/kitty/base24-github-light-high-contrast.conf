# Scheme name: base24 Github Light High Contrast
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming (https://github.com/tinted-theming/tinted-terminal)

# The basic colors
background #ffffff
foreground #343b43
selection_background #343b43
selection_foreground #acb6c0

# Cursor colors
cursor #343b43
cursor_text_color #ffffff

# URL underline color when hovering with mouse
url_color #66707b

# Kitty window border colors
active_border_color #88929d
inactive_border_color #e7ecf0

# OS Window titlebar colors
wayland_titlebar_color #ffffff
macos_titlebar_color #ffffff

# Tab bar colors
active_tab_background #ffffff
active_tab_foreground #343b43
inactive_tab_background #e7ecf0
inactive_tab_foreground #66707b
tab_bar_background #e7ecf0

# The 16 terminal colors
# normal
color0 #ffffff
color1 #702c00
