# Scheme name: base16 Github Light Colorblind
# Scheme author: Tinted Theming (https://github.com/tinted-theming)
# Template author: Tinted Theming (https://github.com/tinted-theming/tinted-terminal)

# The basic colors
background #ffffff
foreground #424a53
selection_background #424a53
selection_foreground #afb8c1

# Cursor colors
cursor #424a53
cursor_text_color #ffffff

# URL underline color when hovering with mouse
url_color #6e7781

# Kitty window border colors
active_border_color #8c959f
inactive_border_color #f6f8fa

# OS Window titlebar colors
wayland_titlebar_color #ffffff
macos_titlebar_color #ffffff

# Tab bar colors
active_tab_background #ffffff
active_tab_foreground #424a53
inactive_tab_background #f6f8fa
inactive_tab_foreground #6e7781
tab_bar_background #f6f8fa

# The 16 terminal colors
# normal
color0 #ffffff
color1 #8a4600
color2 #0a3069
color3 #bf8700
color4 #8250df
color5 #b35900
color6 #0550ae
color7 #424a53

# bright
color8 #8c959f
color9 #8a4600
color10 #0a3069
color11 #bf8700
color12 #8250df
color13 #b35900
color14 #0550ae
color15 #24292f

# extended base16 colors
color16 #0550ae
color17 #6f3800
color18 #f6f8fa
color19 #afb8c1
color20 #6e7781
color21 #32383f
