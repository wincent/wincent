# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Eldritch by https://github.com/eldritch-theme

name: Base24 Eldritch
accent: "#39ddfd" # base0D
cursor: "#ebfafa" # base05
background: "#212337" # base00
foreground: "#ebfafa" # base05
details: darker

terminal_colors:
  normal:
    black: "#212337" # base00
    red: "#f16c75" # base08
    yellow: "#f1fc79" # base0A
    green: "#37f499" # base0B
    cyan: "#04d1f9" # base0C
    blue: "#39ddfd" # base0D
    magenta: "#a48cf2" # base0E
    white: "#ebfafa" # base05

  bright:
    black: "#7081d0" # base03
    red: "#f89a9d" # base12
    yellow: "#f9e9a1" # base13
    green: "#6fffc1" # base14
    cyan: "#6ce9ff" # base15
    blue: "#7ae9ff" # base16
    magenta: "#d4b3ff" # base17
    white: "#ffffff" # base07
