# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: 3024 by Jan T. Sott (http://github.com/idleberg)

name: Base16 3024
accent: "#01a0e4" # base0D
cursor: "#a5a2a2" # base05
background: "#090300" # base00
foreground: "#a5a2a2" # base05
details: darker

terminal_colors:
  bright:
    black: "#090300" # base00
    red: "#db2d20" # base08
    yellow: "#fded02" # base0A
    green: "#01a252" # base0B
    cyan: "#b5e4f4" # base0C
    blue: "#01a0e4" # base0D
    magenta: "#a16a94" # base0E
    white: "#a5a2a2" # base05

  normal:
    black: "#5c5855" # base03
    red: "#db2d20" # base08
    yellow: "#fded02" # base0A
    green: "#01a252" # base0B
    cyan: "#b5e4f4" # base0C
    blue: "#01a0e4" # base0D
    magenta: "#a16a94" # base0E
    white: "#f7f7f7" # base07
