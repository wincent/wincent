# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Red Sands by FredHappyface (https://github.com/fredHappyface)

name: Base24 Red Sands
accent: "#0071ff" # base0D
cursor: "#a1a1a1" # base05
background: "#79241e" # base00
foreground: "#a1a1a1" # base05
details: darker

terminal_colors:
  normal:
    black: "#79241e" # base00
    red: "#ff3f00" # base08
    yellow: "#0071ae" # base0A
    green: "#00bb00" # base0B
    cyan: "#00bbbb" # base0C
    blue: "#0071ff" # base0D
    magenta: "#bb00bb" # base0E
    white: "#a1a1a1" # base05

  bright:
    black: "#6e6e6e" # base03
    red: "#bb0000" # base12
    yellow: "#e7b000" # base13
    green: "#00bb00" # base14
    cyan: "#55ffff" # base15
    blue: "#0071ae" # base16
    magenta: "#ff55ff" # base17
    white: "#ffffff" # base07
