# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Man Page by FredHappyface (https://github.com/fredHappyface)

name: Base24 Man Page
accent: "#0000b2" # base0D
cursor: "#b2b2b2" # base05
background: "#fef49c" # base00
foreground: "#b2b2b2" # base05
details: lighter

terminal_colors:
  normal:
    black: "#fef49c" # base00
    red: "#cc0000" # base08
    yellow: "#0000ff" # base0A
    green: "#00a600" # base0B
    cyan: "#00a6b2" # base0C
    blue: "#0000b2" # base0D
    magenta: "#b200b2" # base0E
    white: "#b2b2b2" # base05

  bright:
    black: "#7f7f7f" # base03
    red: "#e50000" # base12
    yellow: "#e5e500" # base13
    green: "#00d900" # base14
    cyan: "#00e5e5" # base15
    blue: "#0000ff" # base16
    magenta: "#e500e5" # base17
    white: "#e5e5e5" # base07
