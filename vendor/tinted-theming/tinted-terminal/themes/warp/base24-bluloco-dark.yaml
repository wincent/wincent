# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Bluloco Dark by FredHappyface (https://github.com/fredHappyface)

name: Base24 Bluloco Dark
accent: "#285afe" # base0D
cursor: "#b1bac9" # base05
background: "#1e2027" # base00
foreground: "#b1bac9" # base05
details: darker

terminal_colors:
  normal:
    black: "#1e2027" # base00
    red: "#f71041" # base08
    yellow: "#189ffd" # base0A
    green: "#23974a" # base0B
    cyan: "#366f99" # base0C
    blue: "#285afe" # base0D
    magenta: "#8c62fd" # base0E
    white: "#b1bac9" # base05

  bright:
    black: "#7b8494" # base03
    red: "#fb496d" # base12
    yellow: "#f6bd47" # base13
    green: "#37bc58" # base14
    cyan: "#4fabad" # base15
    blue: "#189ffd" # base16
    magenta: "#fb57f6" # base17
    white: "#fefefe" # base07
