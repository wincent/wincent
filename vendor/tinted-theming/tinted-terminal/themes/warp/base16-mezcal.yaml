    white: "#e0d8c8" # base05

  normal:
    black: "#6e6450" # base03
    red: "#da6e54" # base08
    yellow: "#d9a441" # base0A
    green: "#a8b84a" # base0B
    cyan: "#6fc8ae" # base0C
    blue: "#8aa6c0" # base0D
    magenta: "#c28aa8" # base0E
    white: "#f2ead6" # base07
