# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Oxocarbon Dark by shaunsingh/IBM, Tinted Theming (https://github.com/tinted-theming)

name: Base16 Oxocarbon Dark
accent: "#33b1ff" # base0D
cursor: "#f2f4f8" # base05
background: "#161616" # base00
foreground: "#f2f4f8" # base05
details: darker

terminal_colors:
  bright:
    black: "#161616" # base00
    red: "#ee5396" # base08
    yellow: "#ff6f00" # base0A
    green: "#42be65" # base0B
    cyan: "#3ddbd9" # base0C
    blue: "#33b1ff" # base0D
    magenta: "#be95ff" # base0E
    white: "#f2f4f8" # base05

  normal:
    black: "#525252" # base03
    red: "#ee5396" # base08
    yellow: "#ff6f00" # base0A
    green: "#42be65" # base0B
    cyan: "#3ddbd9" # base0C
    blue: "#33b1ff" # base0D
    magenta: "#be95ff" # base0E
    white: "#08bdba" # base07
