# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Cyberdyne by FredHappyface (https://github.com/fredHappyface)

name: Base24 Cyberdyne
accent: "#0071cf" # base0D
cursor: "#c0c0c0" # base05
background: "#151144" # base00
foreground: "#c0c0c0" # base05
details: darker

terminal_colors:
  normal:
    black: "#151144" # base00
    red: "#ff8272" # base08
    yellow: "#c1e3fe" # base0A
    green: "#00c172" # base0B
    cyan: "#6bffdc" # base0C
    blue: "#0071cf" # base0D
    magenta: "#ff8ffd" # base0E
    white: "#c0c0c0" # base05

  bright:
    black: "#5e5e5e" # base03
    red: "#ffc4bd" # base12
    yellow: "#fefdd5" # base13
    green: "#d6fcb9" # base14
    cyan: "#e5e6fe" # base15
    blue: "#c1e3fe" # base16
    magenta: "#ffb1fe" # base17
    white: "#feffff" # base07
