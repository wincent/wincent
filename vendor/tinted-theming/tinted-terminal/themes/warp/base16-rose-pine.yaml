# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Rosé Pine by Emilia Dunfelt &lt;edun@dunfelt.se&gt;

name: Base16 Rosé Pine
accent: "#c4a7e7" # base0D
cursor: "#e0def4" # base05
background: "#191724" # base00
foreground: "#e0def4" # base05
details: darker

terminal_colors:
  bright:
    black: "#191724" # base00
    red: "#eb6f92" # base08
    yellow: "#ebbcba" # base0A
    green: "#31748f" # base0B
    cyan: "#9ccfd8" # base0C
    blue: "#c4a7e7" # base0D
    magenta: "#f6c177" # base0E
    white: "#e0def4" # base05

  normal:
    black: "#6e6a86" # base03
    red: "#eb6f92" # base08
    yellow: "#ebbcba" # base0A
    green: "#31748f" # base0B
    cyan: "#9ccfd8" # base0C
    blue: "#c4a7e7" # base0D
    magenta: "#f6c177" # base0E
    white: "#524f67" # base07
