# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: standardized-light by ali (https://github.com/ali-githb/base16-standardized-scheme)

name: Base16 standardized-light
accent: "#3173c5" # base0D
cursor: "#444444" # base05
background: "#ffffff" # base00
foreground: "#444444" # base05
details: lighter

terminal_colors:
  bright:
    black: "#ffffff" # base00
    red: "#d03e3e" # base08
    yellow: "#ad8200" # base0A
    green: "#31861f" # base0B
    cyan: "#00998f" # base0C
    blue: "#3173c5" # base0D
    magenta: "#9e57c2" # base0E
    white: "#444444" # base05

  normal:
    black: "#767676" # base03
    red: "#d03e3e" # base08
    yellow: "#ad8200" # base0A
    green: "#31861f" # base0B
    cyan: "#00998f" # base0C
    blue: "#3173c5" # base0D
    magenta: "#9e57c2" # base0E
    white: "#222222" # base07
