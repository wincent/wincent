# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Black Metal (Nile) by metalelf0 (https://github.com/metalelf0)

name: Base16 Black Metal (Nile)
accent: "#888888" # base0D
cursor: "#c1c1c1" # base05
background: "#000000" # base00
foreground: "#c1c1c1" # base05
details: darker

terminal_colors:
  bright:
    black: "#000000" # base00
    red: "#5f8787" # base08
    yellow: "#777755" # base0A
    green: "#aa9988" # base0B
    cyan: "#aaaaaa" # base0C
    blue: "#888888" # base0D
    magenta: "#999999" # base0E
    white: "#c1c1c1" # base05

  normal:
    black: "#333333" # base03
    red: "#5f8787" # base08
    yellow: "#777755" # base0A
    green: "#aa9988" # base0B
    cyan: "#aaaaaa" # base0C
    blue: "#888888" # base0D
    magenta: "#999999" # base0E
    white: "#c1c1c1" # base07
