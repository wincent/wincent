# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Snazzy by Chawye Hsu (https://github.com/chawyehsu), based on Hyper Snazzy Theme (https://github.com/sindresorhus/hyper-snazzy)

name: Base16 Snazzy
accent: "#57c7ff" # base0D
cursor: "#e2e4e5" # base05
background: "#282a36" # base00
foreground: "#e2e4e5" # base05
details: darker

terminal_colors:
  bright:
    black: "#282a36" # base00
    red: "#ff5c57" # base08
    yellow: "#f3f99d" # base0A
    green: "#5af78e" # base0B
    cyan: "#9aedfe" # base0C
    blue: "#57c7ff" # base0D
    magenta: "#ff6ac1" # base0E
    white: "#e2e4e5" # base05

  normal:
    black: "#78787e" # base03
    red: "#ff5c57" # base08
    yellow: "#f3f99d" # base0A
    green: "#5af78e" # base0B
    cyan: "#9aedfe" # base0C
    blue: "#57c7ff" # base0D
    magenta: "#ff6ac1" # base0E
    white: "#f1f1f0" # base07
