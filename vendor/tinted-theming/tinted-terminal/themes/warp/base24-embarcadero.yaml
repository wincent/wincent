# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Embarcadero by Thomas Leon Highbaugh

name: Base24 Embarcadero
accent: "#4080d0" # base0D
cursor: "#bcbdc0" # base05
background: "#252a2f" # base00
foreground: "#bcbdc0" # base05
details: darker

terminal_colors:
  normal:
    black: "#252a2f" # base00
    red: "#ed5d86" # base08
    yellow: "#eb824d" # base0A
    green: "#20c290" # base0B
    cyan: "#02efef" # base0C
    blue: "#4080d0" # base0D
    magenta: "#a070d0" # base0E
    white: "#bcbdc0" # base05

  bright:
    black: "#7f8285" # base03
    red: "#f57d9a" # base12
    yellow: "#ffe089" # base13
    green: "#a0d0a0" # base14
    cyan: "#40c0c0" # base15
    blue: "#80b0f0" # base16
    magenta: "#c090f0" # base17
    white: "#f8f8f8" # base07
