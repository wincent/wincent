# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Eldritch by https://github.com/eldritch-theme

name: Base16 Eldritch
accent: "#39ddfd" # base0D
cursor: "#ebfafa" # base05
background: "#212337" # base00
foreground: "#ebfafa" # base05
details: darker

terminal_colors:
  bright:
    black: "#212337" # base00
    red: "#f16c75" # base08
    yellow: "#f1fc79" # base0A
    green: "#37f499" # base0B
    cyan: "#04d1f9" # base0C
    blue: "#39ddfd" # base0D
    magenta: "#a48cf2" # base0E
    white: "#ebfafa" # base05

  normal:
    black: "#7081d0" # base03
    red: "#f16c75" # base08
    yellow: "#f1fc79" # base0A
    green: "#37f499" # base0B
    cyan: "#04d1f9" # base0C
    blue: "#39ddfd" # base0D
    magenta: "#a48cf2" # base0E
    white: "#ffffff" # base07
