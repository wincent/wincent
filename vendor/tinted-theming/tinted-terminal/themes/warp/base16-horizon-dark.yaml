# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Horizon Dark by Michaël Ball (http://github.com/michael-ball/)

name: Base16 Horizon Dark
accent: "#df5273" # base0D
cursor: "#cbced0" # base05
background: "#1c1e26" # base00
foreground: "#cbced0" # base05
details: darker

terminal_colors:
  bright:
    black: "#1c1e26" # base00
    red: "#e93c58" # base08
    yellow: "#efb993" # base0A
    green: "#efaf8e" # base0B
    cyan: "#24a8b4" # base0C
    blue: "#df5273" # base0D
    magenta: "#b072d1" # base0E
    white: "#cbced0" # base05

  normal:
    black: "#6f6f70" # base03
    red: "#e93c58" # base08
    yellow: "#efb993" # base0A
    green: "#efaf8e" # base0B
    cyan: "#24a8b4" # base0C
    blue: "#df5273" # base0D
    magenta: "#b072d1" # base0E
    white: "#e3e6ee" # base07
