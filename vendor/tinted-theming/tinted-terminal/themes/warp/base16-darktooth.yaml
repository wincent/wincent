# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Darktooth by Jason Milkins (https://github.com/jasonm23)

name: Base16 Darktooth
accent: "#0d6678" # base0D
cursor: "#a89984" # base05
background: "#1d2021" # base00
foreground: "#a89984" # base05
details: darker

terminal_colors:
  bright:
    black: "#1d2021" # base00
    red: "#fb543f" # base08
    yellow: "#fac03b" # base0A
    green: "#95c085" # base0B
    cyan: "#8ba59b" # base0C
    blue: "#0d6678" # base0D
    magenta: "#8f4673" # base0E
    white: "#a89984" # base05

  normal:
    black: "#665c54" # base03
    red: "#fb543f" # base08
    yellow: "#fac03b" # base0A
    green: "#95c085" # base0B
    cyan: "#8ba59b" # base0C
    blue: "#0d6678" # base0D
    magenta: "#8f4673" # base0E
    white: "#fdf4c1" # base07
