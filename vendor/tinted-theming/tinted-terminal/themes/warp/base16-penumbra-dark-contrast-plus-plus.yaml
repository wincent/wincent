# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Penumbra Dark Contrast Plus Plus by Zachary Weiss (https://github.com/zacharyweiss)

name: Base16 Penumbra Dark Contrast Plus Plus
accent: "#6eb2fd" # base0D
cursor: "#dedede" # base05
background: "#0d0f13" # base00
foreground: "#dedede" # base05
details: darker

terminal_colors:
  bright:
    black: "#0d0f13" # base00
    red: "#f58c81" # base08
    yellow: "#a9b852" # base0A
    green: "#54c794" # base0B
    cyan: "#00c4d7" # base0C
    blue: "#6eb2fd" # base0D
    magenta: "#b69cf6" # base0E
    white: "#dedede" # base05

  normal:
    black: "#636363" # base03
    red: "#f58c81" # base08
    yellow: "#a9b852" # base0A
    green: "#54c794" # base0B
    cyan: "#00c4d7" # base0C
    blue: "#6eb2fd" # base0D
    magenta: "#b69cf6" # base0E
    white: "#fffdfb" # base07
