# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Bright by Chris Kempson (http://chriskempson.com)

name: Base16 Bright
accent: "#6fb3d2" # base0D
cursor: "#e0e0e0" # base05
background: "#000000" # base00
foreground: "#e0e0e0" # base05
details: darker

terminal_colors:
  bright:
    black: "#000000" # base00
    red: "#fb0120" # base08
    yellow: "#fda331" # base0A
    green: "#a1c659" # base0B
    cyan: "#76c7b7" # base0C
    blue: "#6fb3d2" # base0D
    magenta: "#d381c3" # base0E
    white: "#e0e0e0" # base05

  normal:
    black: "#b0b0b0" # base03
    red: "#fb0120" # base08
    yellow: "#fda331" # base0A
    green: "#a1c659" # base0B
    cyan: "#76c7b7" # base0C
    blue: "#6fb3d2" # base0D
    magenta: "#d381c3" # base0E
    white: "#ffffff" # base07
