# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Ultra Violet by FredHappyface (https://github.com/fredHappyface)

name: Base24 Ultra Violet
accent: "#47dffb" # base0D
cursor: "#c1c2c2" # base05
background: "#242728" # base00
foreground: "#c1c2c2" # base05
details: darker

terminal_colors:
  normal:
    black: "#242728" # base00
    red: "#ff0090" # base08
    yellow: "#7febff" # base0A
    green: "#b5ff00" # base0B
    cyan: "#0effbb" # base0C
    blue: "#47dffb" # base0D
    magenta: "#d630ff" # base0E
    white: "#c1c2c2" # base05

  bright:
    black: "#818484" # base03
    red: "#fb57b4" # base12
    yellow: "#ebdf86" # base13
    green: "#deff8b" # base14
    cyan: "#68fcd2" # base15
    blue: "#7febff" # base16
    magenta: "#e681ff" # base17
    white: "#f9f9f4" # base07
