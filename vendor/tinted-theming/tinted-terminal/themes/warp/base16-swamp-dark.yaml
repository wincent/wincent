# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Swamp Dark by Masroof Maindak (https://github.com/masroof-maindak)

name: Base16 Swamp Dark
accent: "#c1666b" # base0D
cursor: "#d2c3a4" # base05
background: "#242015" # base00
foreground: "#d2c3a4" # base05
details: darker

terminal_colors:
