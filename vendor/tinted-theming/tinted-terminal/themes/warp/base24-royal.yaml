# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Royal by FredHappyface (https://github.com/fredHappyface)

name: Base24 Royal
accent: "#6480af" # base0D
cursor: "#49425a" # base05
background: "#100814" # base00
foreground: "#49425a" # base05
details: darker

terminal_colors:
  normal:
    black: "#100814" # base00
    red: "#90274b" # base08
    yellow: "#8fb9f9" # base0A
    green: "#23801c" # base0B
    cyan: "#8aaabd" # base0C
    blue: "#6480af" # base0D
    magenta: "#664d96" # base0E
    white: "#49425a" # base05

  bright:
    black: "#393446" # base03
    red: "#d4346c" # base12
    yellow: "#fde83a" # base13
    green: "#2cd845" # base14
    cyan: "#abd3eb" # base15
    blue: "#8fb9f9" # base16
    magenta: "#a479e2" # base17
    white: "#9d8bbd" # base07
