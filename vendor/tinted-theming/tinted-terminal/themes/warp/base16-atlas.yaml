# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Atlas by Alex Lende (https://ajlende.com)

name: Base16 Atlas
accent: "#14747e" # base0D
cursor: "#a1a19a" # base05
background: "#002635" # base00
foreground: "#a1a19a" # base05
details: darker

terminal_colors:
  bright:
    black: "#002635" # base00
    red: "#ff5a67" # base08
    yellow: "#ffcc1b" # base0A
    green: "#7fc06e" # base0B
    cyan: "#5dd7b9" # base0C
    blue: "#14747e" # base0D
    magenta: "#9a70a4" # base0E
    white: "#a1a19a" # base05

  normal:
    black: "#6c8b91" # base03
    red: "#ff5a67" # base08
    yellow: "#ffcc1b" # base0A
    green: "#7fc06e" # base0B
    cyan: "#5dd7b9" # base0C
    blue: "#14747e" # base0D
    magenta: "#9a70a4" # base0E
    white: "#fafaf8" # base07
