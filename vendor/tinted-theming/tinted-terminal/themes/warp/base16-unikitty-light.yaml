# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Unikitty Light by Josh W Lewis (@joshwlewis)

name: Base16 Unikitty Light
accent: "#775dff" # base0D
cursor: "#6c696e" # base05
background: "#ffffff" # base00
foreground: "#6c696e" # base05
details: lighter

terminal_colors:
  bright:
    black: "#ffffff" # base00
    red: "#d8137f" # base08
    yellow: "#dc8a0e" # base0A
    green: "#17ad98" # base0B
    cyan: "#149bda" # base0C
    blue: "#775dff" # base0D
    magenta: "#aa17e6" # base0E
    white: "#6c696e" # base05

  normal:
    black: "#a7a5a8" # base03
    red: "#d8137f" # base08
    yellow: "#dc8a0e" # base0A
    green: "#17ad98" # base0B
    cyan: "#149bda" # base0C
    blue: "#775dff" # base0D
    magenta: "#aa17e6" # base0E
    white: "#322d34" # base07
