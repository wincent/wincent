# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Tokyo City Dark by Michaël Ball

name: Base16 Tokyo City Dark
accent: "#7aa2f7" # base0D
cursor: "#d8e2ec" # base05
background: "#171d23" # base00
foreground: "#d8e2ec" # base05
details: darker

terminal_colors:
  bright:
    black: "#171d23" # base00
