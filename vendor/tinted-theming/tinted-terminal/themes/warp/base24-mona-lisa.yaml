# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Mona Lisa by FredHappyface (https://github.com/fredHappyface)

name: Base24 Mona Lisa
accent: "#515b5c" # base0D
cursor: "#dab14e" # base05
background: "#110b0d" # base00
foreground: "#dab14e" # base05
details: darker

terminal_colors:
  normal:
    black: "#110b0d" # base00
    red: "#9b281b" # base08
    yellow: "#9eb2b3" # base0A
    green: "#626132" # base0B
