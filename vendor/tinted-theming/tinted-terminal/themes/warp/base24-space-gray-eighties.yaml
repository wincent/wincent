# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Space Gray Eighties by FredHappyface (https://github.com/fredHappyface)

name: Base24 Space Gray Eighties
accent: "#5485c0" # base0D
cursor: "#c7c6c2" # base05
background: "#212121" # base00
foreground: "#c7c6c2" # base05
details: darker

terminal_colors:
  normal:
    black: "#212121" # base00
    red: "#ec5f67" # base08
    yellow: "#4d83d0" # base0A
    green: "#80a763" # base0B
    cyan: "#57c2c0" # base0C
    blue: "#5485c0" # base0D
    magenta: "#bf83c0" # base0E
    white: "#c7c6c2" # base05

  bright:
    black: "#7b7a79" # base03
    red: "#ff6973" # base12
    yellow: "#ffd156" # base13
    green: "#93d393" # base14
    cyan: "#83e8e4" # base15
    blue: "#4d83d0" # base16
    magenta: "#ff55ff" # base17
    white: "#ffffff" # base07
