# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Silk Dark by Gabriel Fontes (https://github.com/Misterio77)

name: Base16 Silk Dark
accent: "#46bddd" # base0D
cursor: "#c7dbdd" # base05
background: "#0e3c46" # base00
foreground: "#c7dbdd" # base05
details: darker

terminal_colors:
  bright:
    black: "#0e3c46" # base00
    red: "#fb6953" # base08
    yellow: "#fce380" # base0A
    green: "#73d8ad" # base0B
    cyan: "#3fb2b9" # base0C
    blue: "#46bddd" # base0D
    magenta: "#756b8a" # base0E
    white: "#c7dbdd" # base05

  normal:
    black: "#587073" # base03
    red: "#fb6953" # base08
    yellow: "#fce380" # base0A
    green: "#73d8ad" # base0B
    cyan: "#3fb2b9" # base0C
    blue: "#46bddd" # base0D
    magenta: "#756b8a" # base0E
    white: "#d2faff" # base07
