# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: OneDark by Lalit Magant (http://github.com/tilal6991)

name: Base16 OneDark
accent: "#61afef" # base0D
cursor: "#abb2bf" # base05
background: "#282c34" # base00
foreground: "#abb2bf" # base05
details: darker

terminal_colors:
