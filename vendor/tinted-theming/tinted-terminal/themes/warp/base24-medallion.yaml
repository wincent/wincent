# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Medallion by FredHappyface (https://github.com/fredHappyface)

name: Base24 Medallion
accent: "#606baf" # base0D
cursor: "#aea578" # base05
background: "#1d1808" # base00
foreground: "#aea578" # base05
details: darker

terminal_colors:
  normal:
    black: "#1d1808" # base00
    red: "#b54c00" # base08
    yellow: "#abb8ff" # base0A
    green: "#7c8a16" # base0B
    cyan: "#906b25" # base0C
    blue: "#606baf" # base0D
    magenta: "#8b5990" # base0E
    white: "#aea578" # base05

  bright:
    black: "#786d38" # base03
    red: "#ff9148" # base12
    yellow: "#ffe449" # base13
    green: "#b1c93a" # base14
    cyan: "#ffbb51" # base15
    blue: "#abb8ff" # base16
    magenta: "#fe9fff" # base17
    white: "#fed597" # base07
