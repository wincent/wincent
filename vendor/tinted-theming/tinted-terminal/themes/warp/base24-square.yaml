# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Square by FredHappyface (https://github.com/fredHappyface)

name: Base24 Square
accent: "#a9cdeb" # base0D
cursor: "#bababa" # base05
background: "#1a1a1a" # base00
foreground: "#bababa" # base05
details: darker

terminal_colors:
