# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Chinoiserie Midnight by Di Wang (https://cs.cmu.edu/~diw3)

name: Base16 Chinoiserie Midnight
accent: "#81a2a2" # base0D
cursor: "#c4cbcf" # base05
background: "#1d1d1d" # base00
foreground: "#c4cbcf" # base05
details: darker

terminal_colors:
  bright:
    black: "#1d1d1d" # base00
    red: "#ed5a56" # base08
    yellow: "#fbb957" # base0A
    green: "#aeb831" # base0B
    cyan: "#88b68d" # base0C
    blue: "#81a2a2" # base0D
    magenta: "#cf8997" # base0E
    white: "#c4cbcf" # base05

  normal:
    black: "#918072" # base03
    red: "#ed5a56" # base08
    yellow: "#fbb957" # base0A
    green: "#aeb831" # base0B
    cyan: "#88b68d" # base0C
    blue: "#81a2a2" # base0D
    magenta: "#cf8997" # base0E
    white: "#fffef9" # base07
