# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Github Dark by Tinted Theming (https://github.com/tinted-theming)

name: Base16 Github Dark
accent: "#d2a8ff" # base0D
cursor: "#c9d1d9" # base05
background: "#0d1117" # base00
foreground: "#c9d1d9" # base05
details: darker

terminal_colors:
  bright:
    black: "#0d1117" # base00
    red: "#ffa657" # base08
    yellow: "#bb8009" # base0A
    green: "#a5d6ff" # base0B
    cyan: "#7ee787" # base0C
    blue: "#d2a8ff" # base0D
    magenta: "#ff7b72" # base0E
    white: "#c9d1d9" # base05

  normal:
    black: "#6e7681" # base03
    red: "#ffa657" # base08
    yellow: "#bb8009" # base0A
    green: "#a5d6ff" # base0B
    cyan: "#7ee787" # base0C
    blue: "#d2a8ff" # base0D
    magenta: "#ff7b72" # base0E
    white: "#ffffff" # base07
