# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Atelier Forest by Bram de Haan (http://atelierbramdehaan.nl)

name: Base16 Atelier Forest
accent: "#407ee7" # base0D
cursor: "#a8a19f" # base05
background: "#1b1918" # base00
foreground: "#a8a19f" # base05
details: darker

terminal_colors:
  bright:
    black: "#1b1918" # base00
    red: "#f22c40" # base08
    yellow: "#c38418" # base0A
    green: "#7b9726" # base0B
    cyan: "#3d97b8" # base0C
    blue: "#407ee7" # base0D
    magenta: "#6666ea" # base0E
    white: "#a8a19f" # base05

  normal:
    black: "#766e6b" # base03
    red: "#f22c40" # base08
    yellow: "#c38418" # base0A
    green: "#7b9726" # base0B
    cyan: "#3d97b8" # base0C
    blue: "#407ee7" # base0D
    magenta: "#6666ea" # base0E
    white: "#f1efee" # base07
