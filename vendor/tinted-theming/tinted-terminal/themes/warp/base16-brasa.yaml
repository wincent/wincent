    magenta: "#e68aa2" # base0E
    white: "#f0d8c0" # base05

  normal:
    black: "#7a6150" # base03
    red: "#f2685a" # base08
    yellow: "#f0b23a" # base0A
    green: "#b8c24a" # base0B
    cyan: "#6bc8b8" # base0C
    blue: "#9aa6e0" # base0D
    magenta: "#e68aa2" # base0E
    white: "#fbead8" # base07
