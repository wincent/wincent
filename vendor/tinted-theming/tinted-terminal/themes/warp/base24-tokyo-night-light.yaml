# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Tokyo Night Light by Michaël Ball, based on Tokyo Night by enkia (https://github.com/enkia/tokyo-night-vscode-theme)

name: Base24 Tokyo Night Light
accent: "#34548a" # base0D
cursor: "#343b59" # base05
background: "#d5d6db" # base00
foreground: "#343b59" # base05
details: lighter

terminal_colors:
  normal:
    black: "#d5d6db" # base00
    red: "#343b59" # base08
    yellow: "#166775" # base0A
    green: "#485e30" # base0B
    cyan: "#3e6968" # base0C
    blue: "#34548a" # base0D
    magenta: "#5a4a78" # base0E
    white: "#343b59" # base05

  bright:
    black: "#9699a3" # base03
    red: "#8c4351" # base12
    yellow: "#965027" # base13
    green: "#485e30" # base14
    cyan: "#3e6968" # base15
    blue: "#34548a" # base16
    magenta: "#5a4a78" # base17
    white: "#1a1b26" # base07
