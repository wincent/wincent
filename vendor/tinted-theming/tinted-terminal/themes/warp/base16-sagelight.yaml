# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Sagelight by Carter Veldhuizen

name: Base16 Sagelight
accent: "#a0a7d2" # base0D
cursor: "#383838" # base05
background: "#f8f8f8" # base00
foreground: "#383838" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f8f8f8" # base00
    red: "#fa8480" # base08
    yellow: "#ffdc61" # base0A
    green: "#a0d2c8" # base0B
    cyan: "#a2d6f5" # base0C
    blue: "#a0a7d2" # base0D
    magenta: "#c8a0d2" # base0E
    white: "#383838" # base05

  normal:
    black: "#b8b8b8" # base03
    red: "#fa8480" # base08
    yellow: "#ffdc61" # base0A
    green: "#a0d2c8" # base0B
    cyan: "#a2d6f5" # base0C
    blue: "#a0a7d2" # base0D
    magenta: "#c8a0d2" # base0E
    white: "#181818" # base07
