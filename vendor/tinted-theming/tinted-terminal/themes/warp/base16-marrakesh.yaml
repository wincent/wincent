# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Marrakesh by Alexandre Gavioli (http://github.com/Alexx2/)

name: Base16 Marrakesh
accent: "#477ca1" # base0D
cursor: "#948e48" # base05
background: "#201602" # base00
foreground: "#948e48" # base05
details: darker

terminal_colors:
  bright:
    black: "#201602" # base00
    red: "#c35359" # base08
    yellow: "#a88339" # base0A
    green: "#18974e" # base0B
    cyan: "#75a738" # base0C
    blue: "#477ca1" # base0D
    magenta: "#8868b3" # base0E
    white: "#948e48" # base05

  normal:
    black: "#6c6823" # base03
    red: "#c35359" # base08
    yellow: "#a88339" # base0A
    green: "#18974e" # base0B
    cyan: "#75a738" # base0C
    blue: "#477ca1" # base0D
    magenta: "#8868b3" # base0E
    white: "#faf0a5" # base07
