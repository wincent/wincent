# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Windows 10 Light by Fergus Collins (https://github.com/ferguscollins)

name: Base16 Windows 10 Light
accent: "#0037da" # base0D
cursor: "#767676" # base05
background: "#f2f2f2" # base00
foreground: "#767676" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f2f2f2" # base00
    red: "#c50f1f" # base08
    yellow: "#c19c00" # base0A
    green: "#13a10e" # base0B
    cyan: "#3a96dd" # base0C
    blue: "#0037da" # base0D
    magenta: "#881798" # base0E
    white: "#767676" # base05

  normal:
    black: "#cccccc" # base03
    red: "#c50f1f" # base08
    yellow: "#c19c00" # base0A
    green: "#13a10e" # base0B
    cyan: "#3a96dd" # base0C
    blue: "#0037da" # base0D
    magenta: "#881798" # base0E
    white: "#0c0c0c" # base07
