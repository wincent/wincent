# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Heetch Light by Geoffrey Teale (tealeg@gmail.com), Tinted Theming (https://github.com/tinted-theming)

name: Base16 Heetch Light
accent: "#5ba2b6" # base0D
cursor: "#5a496e" # base05
background: "#feffff" # base00
foreground: "#5a496e" # base05
details: lighter

terminal_colors:
  bright:
    black: "#feffff" # base00
    red: "#f80059" # base08
    yellow: "#bd9701" # base0A
    green: "#5bb66a" # base0B
    cyan: "#47f9f5" # base0C
    blue: "#5ba2b6" # base0D
    magenta: "#8f6c97" # base0E
    white: "#5a496e" # base05

  normal:
    black: "#9c92a8" # base03
    red: "#f80059" # base08
    yellow: "#bd9701" # base0A
    green: "#5bb66a" # base0B
    cyan: "#47f9f5" # base0C
    blue: "#5ba2b6" # base0D
    magenta: "#8f6c97" # base0E
    white: "#190134" # base07
