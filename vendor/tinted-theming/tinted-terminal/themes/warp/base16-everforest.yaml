# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Everforest by Sainnhe Park (https://github.com/sainnhe)

name: Base16 Everforest
accent: "#7fbbb3" # base0D
cursor: "#d3c6aa" # base05
background: "#2d353b" # base00
foreground: "#d3c6aa" # base05
details: darker

terminal_colors:
  bright:
    black: "#2d353b" # base00
    red: "#e67e80" # base08
    yellow: "#dbbc7f" # base0A
    green: "#a7c080" # base0B
    cyan: "#83c092" # base0C
    blue: "#7fbbb3" # base0D
    magenta: "#d699b6" # base0E
    white: "#d3c6aa" # base05

  normal:
    black: "#859289" # base03
    red: "#e67e80" # base08
    yellow: "#dbbc7f" # base0A
    green: "#a7c080" # base0B
    cyan: "#83c092" # base0C
    blue: "#7fbbb3" # base0D
    magenta: "#d699b6" # base0E
    white: "#fdf6e3" # base07
