# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Monokai by Wimer Hazenberg (http://www.monokai.nl)

name: Base16 Monokai
accent: "#66d9ef" # base0D
cursor: "#f8f8f2" # base05
background: "#272822" # base00
foreground: "#f8f8f2" # base05
details: darker

terminal_colors:
  bright:
    black: "#272822" # base00
    red: "#f92672" # base08
    yellow: "#f4bf75" # base0A
    green: "#a6e22e" # base0B
    cyan: "#a1efe4" # base0C
    blue: "#66d9ef" # base0D
    magenta: "#ae81ff" # base0E
    white: "#f8f8f2" # base05

  normal:
    black: "#75715e" # base03
    red: "#f92672" # base08
    yellow: "#f4bf75" # base0A
    green: "#a6e22e" # base0B
    cyan: "#a1efe4" # base0C
    blue: "#66d9ef" # base0D
    magenta: "#ae81ff" # base0E
    white: "#f9f8f5" # base07
