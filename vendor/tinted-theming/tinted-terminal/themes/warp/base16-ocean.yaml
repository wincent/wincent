# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Ocean by Chris Kempson (http://chriskempson.com)

name: Base16 Ocean
accent: "#8fa1b3" # base0D
cursor: "#c0c5ce" # base05
background: "#2b303b" # base00
foreground: "#c0c5ce" # base05
details: darker

terminal_colors:
  bright:
    black: "#2b303b" # base00
    red: "#bf616a" # base08
    yellow: "#ebcb8b" # base0A
    green: "#a3be8c" # base0B
    cyan: "#96b5b4" # base0C
    blue: "#8fa1b3" # base0D
    magenta: "#b48ead" # base0E
    white: "#c0c5ce" # base05

  normal:
    black: "#65737e" # base03
    red: "#bf616a" # base08
    yellow: "#ebcb8b" # base0A
    green: "#a3be8c" # base0B
    cyan: "#96b5b4" # base0C
    blue: "#8fa1b3" # base0D
    magenta: "#b48ead" # base0E
    white: "#eff1f5" # base07
