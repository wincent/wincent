# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Later This Evening by FredHappyface (https://github.com/fredHappyface)

name: Base24 Later This Evening
accent: "#a0b9d5" # base0D
cursor: "#a6a6a6" # base05
background: "#212121" # base00
foreground: "#a6a6a6" # base05
details: darker

terminal_colors:
  normal:
    black: "#212121" # base00
    red: "#d35a5f" # base08
    yellow: "#e5d289" # base0A
    green: "#afba66" # base0B
    cyan: "#91beb6" # base0C
    blue: "#a0b9d5" # base0D
    magenta: "#bf92d5" # base0E
    white: "#a6a6a6" # base05

  bright:
    black: "#6f6f6f" # base03
    red: "#d3222e" # base12
    yellow: "#e4bd39" # base13
    green: "#aabb39" # base14
    cyan: "#5fbfad" # base15
    blue: "#6599d5" # base16
    magenta: "#aa52d5" # base17
    white: "#d9d9d9" # base07
