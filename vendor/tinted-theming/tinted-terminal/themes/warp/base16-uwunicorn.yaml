    magenta: "#78a38f" # base0E
    white: "#eed5d9" # base05

  normal:
    black: "#6c3cb2" # base03
    red: "#877bb6" # base08
    yellow: "#a84a73" # base0A
    green: "#c965bf" # base0B
    cyan: "#9c5fce" # base0C
    blue: "#6a9eb5" # base0D
    magenta: "#78a38f" # base0E
    white: "#e4ccd0" # base07
