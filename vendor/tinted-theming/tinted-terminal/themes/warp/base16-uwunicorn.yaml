# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: UwUnicorn by Fernando Marques (https://github.com/RakkiUwU) and Gabriel Fontes (https://github.com/Misterio77)

name: Base16 UwUnicorn
accent: "#6a9eb5" # base0D
cursor: "#eed5d9" # base05
background: "#241b26" # base00
foreground: "#eed5d9" # base05
details: darker

terminal_colors:
  bright:
    black: "#241b26" # base00
    red: "#877bb6" # base08
    yellow: "#a84a73" # base0A
    green: "#c965bf" # base0B
    cyan: "#9c5fce" # base0C
