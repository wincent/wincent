# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Penumbra Dark by Zachary Weiss (https://github.com/zacharyweiss)

name: Base16 Penumbra Dark
accent: "#5794d0" # base0D
cursor: "#bebebe" # base05
background: "#24272b" # base00
foreground: "#bebebe" # base05
details: darker

terminal_colors:
  bright:
    black: "#24272b" # base00
    red: "#ca736c" # base08
    yellow: "#8d9741" # base0A
    green: "#47a477" # base0B
    cyan: "#00a2af" # base0C
    blue: "#5794d0" # base0D
    magenta: "#9481cc" # base0E
    white: "#bebebe" # base05

  normal:
    black: "#636363" # base03
    red: "#ca736c" # base08
    yellow: "#8d9741" # base0A
    green: "#47a477" # base0B
    cyan: "#00a2af" # base0C
    blue: "#5794d0" # base0D
    magenta: "#9481cc" # base0E
    white: "#fffdfb" # base07
