# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Atelier Cave Light by Bram de Haan (http://atelierbramdehaan.nl)

name: Base16 Atelier Cave Light
accent: "#576ddb" # base0D
cursor: "#585260" # base05
background: "#efecf4" # base00
foreground: "#585260" # base05
details: lighter

terminal_colors:
  bright:
    black: "#efecf4" # base00
    red: "#be4678" # base08
    yellow: "#a06e3b" # base0A
    green: "#2a9292" # base0B
    cyan: "#398bc6" # base0C
    blue: "#576ddb" # base0D
    magenta: "#955ae7" # base0E
    white: "#585260" # base05

  normal:
    black: "#7e7887" # base03
    red: "#be4678" # base08
    yellow: "#a06e3b" # base0A
    green: "#2a9292" # base0B
    cyan: "#398bc6" # base0C
    blue: "#576ddb" # base0D
    magenta: "#955ae7" # base0E
    white: "#19171c" # base07
