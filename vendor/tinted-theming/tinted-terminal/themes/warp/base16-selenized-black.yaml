# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: selenized-black by Jan Warchol (https://github.com/jan-warchol/selenized) / adapted to base16 by ali

name: Base16 selenized-black
accent: "#368aeb" # base0D
cursor: "#b9b9b9" # base05
background: "#181818" # base00
foreground: "#b9b9b9" # base05
details: darker

terminal_colors:
  bright:
    black: "#181818" # base00
    red: "#ed4a46" # base08
    yellow: "#dbb32d" # base0A
    green: "#70b433" # base0B
    cyan: "#3fc5b7" # base0C
    blue: "#368aeb" # base0D
    magenta: "#a580e2" # base0E
    white: "#b9b9b9" # base05

  normal:
    black: "#777777" # base03
    red: "#ed4a46" # base08
    yellow: "#dbb32d" # base0A
    green: "#70b433" # base0B
    cyan: "#3fc5b7" # base0C
    blue: "#368aeb" # base0D
    magenta: "#a580e2" # base0E
    white: "#dedede" # base07
