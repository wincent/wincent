# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Solarized Dark Higher Contrast by FredHappyface (https://github.com/fredHappyface)

name: Base24 Solarized Dark Higher Contrast
accent: "#2075c7" # base0D
cursor: "#aec2ba" # base05
