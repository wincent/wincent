# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: boo-shnickle-light by boo-shnickle (@boo_shnickle)

name: Base16 boo-shnickle-light
accent: "#bfbfd9" # base0D
cursor: "#5b5b49" # base05
background: "#ffffcc" # base00
foreground: "#5b5b49" # base05
details: lighter

terminal_colors:
  bright:
    black: "#ffffcc" # base00
    red: "#ffbfa5" # base08
