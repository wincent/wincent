    white: "#5b5b49" # base05

  normal:
    black: "#9c9c7d" # base03
    red: "#ffbfa5" # base08
    yellow: "#fff299" # base0A
    green: "#e7ff99" # base0B
    cyan: "#bfffc5" # base0C
