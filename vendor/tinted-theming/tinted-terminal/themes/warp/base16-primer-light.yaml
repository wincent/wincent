# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Primer Light by Jimmy Lin

name: Base16 Primer Light
accent: "#0366d6" # base0D
cursor: "#2f363d" # base05
background: "#fafbfc" # base00
foreground: "#2f363d" # base05
details: lighter

terminal_colors:
  bright:
    black: "#fafbfc" # base00
    red: "#d73a49" # base08
    yellow: "#ffd33d" # base0A
    green: "#28a745" # base0B
    cyan: "#79b8ff" # base0C
    blue: "#0366d6" # base0D
    magenta: "#ea4aaa" # base0E
    white: "#2f363d" # base05

  normal:
    black: "#959da5" # base03
    red: "#d73a49" # base08
    yellow: "#ffd33d" # base0A
    green: "#28a745" # base0B
    cyan: "#79b8ff" # base0C
    blue: "#0366d6" # base0D
    magenta: "#ea4aaa" # base0E
    white: "#1b1f23" # base07
