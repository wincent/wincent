# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Hardcore by Chris Caller

name: Base16 Hardcore
accent: "#66d9ef" # base0D
cursor: "#cdcdcd" # base05
background: "#212121" # base00
foreground: "#cdcdcd" # base05
details: darker

terminal_colors:
  bright:
    black: "#212121" # base00
    red: "#f92672" # base08
    yellow: "#e6db74" # base0A
    green: "#a6e22e" # base0B
    cyan: "#708387" # base0C
    blue: "#66d9ef" # base0D
    magenta: "#9e6ffe" # base0E
    white: "#cdcdcd" # base05

  normal:
    black: "#4a4a4a" # base03
    red: "#f92672" # base08
    yellow: "#e6db74" # base0A
    green: "#a6e22e" # base0B
    cyan: "#708387" # base0C
    blue: "#66d9ef" # base0D
    magenta: "#9e6ffe" # base0E
    white: "#ffffff" # base07
