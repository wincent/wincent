# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Nord Light by threddast, based on fuxialexander&#39;s doom-nord-light-theme (Doom Emacs)

name: Base16 Nord Light
accent: "#3b6ea8" # base0D
cursor: "#2e3440" # base05
background: "#e5e9f0" # base00
foreground: "#2e3440" # base05
details: lighter

terminal_colors:
  bright:
    black: "#e5e9f0" # base00
    red: "#99324b" # base08
    yellow: "#9a7500" # base0A
    green: "#4f894c" # base0B
    cyan: "#398eac" # base0C
    blue: "#3b6ea8" # base0D
    magenta: "#97365b" # base0E
    white: "#2e3440" # base05

  normal:
    black: "#aebacf" # base03
    red: "#99324b" # base08
    yellow: "#9a7500" # base0A
    green: "#4f894c" # base0B
    cyan: "#398eac" # base0C
    blue: "#3b6ea8" # base0D
    magenta: "#97365b" # base0E
    white: "#29838d" # base07
