# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Framer by Framer (Maintained by Jesse Hoyos)

name: Base16 Framer
accent: "#20bcfc" # base0D
cursor: "#d0d0d0" # base05
background: "#181818" # base00
foreground: "#d0d0d0" # base05
details: darker

terminal_colors:
  bright:
    black: "#181818" # base00
    red: "#fd886b" # base08
    yellow: "#fecb6e" # base0A
    green: "#32ccdc" # base0B
    cyan: "#acddfd" # base0C
    blue: "#20bcfc" # base0D
    magenta: "#ba8cfc" # base0E
    white: "#d0d0d0" # base05

  normal:
    black: "#747474" # base03
    red: "#fd886b" # base08
    yellow: "#fecb6e" # base0A
    green: "#32ccdc" # base0B
    cyan: "#acddfd" # base0C
    blue: "#20bcfc" # base0D
    magenta: "#ba8cfc" # base0E
    white: "#eeeeee" # base07
