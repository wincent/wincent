# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Default Light by Chris Kempson (http://chriskempson.com)

name: Base16 Default Light
accent: "#7cafc2" # base0D
cursor: "#383838" # base05
background: "#f8f8f8" # base00
foreground: "#383838" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f8f8f8" # base00
    red: "#ab4642" # base08
    yellow: "#f7ca88" # base0A
    green: "#a1b56c" # base0B
    cyan: "#86c1b9" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#ba8baf" # base0E
    white: "#383838" # base05

  normal:
    black: "#b8b8b8" # base03
    red: "#ab4642" # base08
    yellow: "#f7ca88" # base0A
    green: "#a1b56c" # base0B
    cyan: "#86c1b9" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#ba8baf" # base0E
    white: "#181818" # base07
