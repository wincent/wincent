# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Github Dark Dimmed by Tinted Theming (https://github.com/tinted-theming)

name: Base16 Github Dark Dimmed
accent: "#dcbdfb" # base0D
cursor: "#adbac7" # base05
background: "#22272e" # base00
foreground: "#adbac7" # base05
details: darker

terminal_colors:
  bright:
    black: "#22272e" # base00
    red: "#f69d50" # base08
    yellow: "#ae7c14" # base0A
    green: "#96d0ff" # base0B
    cyan: "#8ddb8c" # base0C
    blue: "#dcbdfb" # base0D
    magenta: "#f47067" # base0E
    white: "#adbac7" # base05

  normal:
    black: "#636e7b" # base03
    red: "#f69d50" # base08
    yellow: "#ae7c14" # base0A
    green: "#96d0ff" # base0B
    cyan: "#8ddb8c" # base0C
    blue: "#dcbdfb" # base0D
    magenta: "#f47067" # base0E
    white: "#ffffff" # base07
