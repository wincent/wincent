# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Oceanic Material by FredHappyface (https://github.com/fredHappyface)

name: Base24 Oceanic Material
accent: "#1d80ef" # base0D
cursor: "#989898" # base05
background: "#1c262b" # base00
foreground: "#989898" # base05
details: darker

terminal_colors:
  normal:
    black: "#1c262b" # base00
    red: "#ee2a29" # base08
    yellow: "#53a4f3" # base0A
    green: "#3fa33f" # base0B
    cyan: "#16aec9" # base0C
    blue: "#1d80ef" # base0D
    magenta: "#8800a0" # base0E
    white: "#989898" # base05

  bright:
    black: "#818181" # base03
    red: "#dc5b60" # base12
    yellow: "#fef063" # base13
    green: "#70be71" # base14
    cyan: "#42c6d9" # base15
    blue: "#53a4f3" # base16
    magenta: "#a94dbb" # base17
    white: "#fffefe" # base07
