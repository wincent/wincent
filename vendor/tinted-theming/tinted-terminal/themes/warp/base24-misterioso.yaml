# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Misterioso by FredHappyface (https://github.com/fredHappyface)

name: Base24 Misterioso
accent: "#338f86" # base0D
cursor: "#bebebd" # base05
background: "#2d3743" # base00
foreground: "#bebebd" # base05
details: darker

terminal_colors:
  normal:
    black: "#2d3743" # base00
    red: "#ff4242" # base08
    yellow: "#23d7d7" # base0A
    green: "#74af68" # base0B
    cyan: "#23d7d7" # base0C
    blue: "#338f86" # base0D
    magenta: "#9413e5" # base0E
    white: "#bebebd" # base05

  bright:
    black: "#787877" # base03
    red: "#ff3242" # base12
    yellow: "#ffb929" # base13
    green: "#74cd68" # base14
    cyan: "#00ede1" # base15
    blue: "#23d7d7" # base16
    magenta: "#ff37ff" # base17
    white: "#ffffff" # base07
