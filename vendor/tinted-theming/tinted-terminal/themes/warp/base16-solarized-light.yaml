# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Solarized Light by Ethan Schoonover (modified by aramisgithub)

name: Base16 Solarized Light
accent: "#268bd2" # base0D
cursor: "#586e75" # base05
background: "#fdf6e3" # base00
foreground: "#586e75" # base05
details: lighter

terminal_colors:
  bright:
    black: "#fdf6e3" # base00
    red: "#dc322f" # base08
    yellow: "#b58900" # base0A
    green: "#859900" # base0B
    cyan: "#2aa198" # base0C
    blue: "#268bd2" # base0D
    magenta: "#6c71c4" # base0E
    white: "#586e75" # base05

  normal:
    black: "#839496" # base03
    red: "#dc322f" # base08
    yellow: "#b58900" # base0A
    green: "#859900" # base0B
    cyan: "#2aa198" # base0C
    blue: "#268bd2" # base0D
    magenta: "#6c71c4" # base0E
    white: "#002b36" # base07
