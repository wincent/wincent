# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Mission Brogue by Thomas Leon Highbaugh

name: Base24 Mission Brogue
accent: "#a2c5fd" # base0D
cursor: "#93a5b4" # base05
background: "#283139" # base00
foreground: "#93a5b4" # base05
details: darker

terminal_colors:
  normal:
    black: "#283139" # base00
    red: "#efa9a9" # base08
    yellow: "#e0b88a" # base0A
    green: "#8cd4b0" # base0B
    cyan: "#93dfec" # base0C
    blue: "#a2c5fd" # base0D
    magenta: "#ccb7db" # base0E
    white: "#93a5b4" # base05

  bright:
    black: "#60778a" # base03
    red: "#f6bfbf" # base12
    yellow: "#fff0b2" # base13
    green: "#b5e090" # base14
    cyan: "#b2f0fd" # base15
    blue: "#c3d9fd" # base16
    magenta: "#e3c3e6" # base17
    white: "#e7ebee" # base07
