# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Mocha by Chris Kempson (http://chriskempson.com)

name: Base16 Mocha
accent: "#8ab3b5" # base0D
cursor: "#d0c8c6" # base05
background: "#3b3228" # base00
foreground: "#d0c8c6" # base05
details: darker

terminal_colors:
  bright:
    black: "#3b3228" # base00
    red: "#cb6077" # base08
    yellow: "#f4bc87" # base0A
    green: "#beb55b" # base0B
    cyan: "#7bbda4" # base0C
    blue: "#8ab3b5" # base0D
    magenta: "#a89bb9" # base0E
    white: "#d0c8c6" # base05

  normal:
    black: "#7e705a" # base03
    red: "#cb6077" # base08
    yellow: "#f4bc87" # base0A
    green: "#beb55b" # base0B
    cyan: "#7bbda4" # base0C
    blue: "#8ab3b5" # base0D
    magenta: "#a89bb9" # base0E
    white: "#f5eeeb" # base07
