# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Solar Flare by Chuck Harmston (https://chuck.harmston.ch)

name: Base16 Solar Flare
accent: "#33b5e1" # base0D
cursor: "#a6afb8" # base05
background: "#18262f" # base00
foreground: "#a6afb8" # base05
details: darker

terminal_colors:
  bright:
    black: "#18262f" # base00
    red: "#ef5253" # base08
    yellow: "#e4b51c" # base0A
    green: "#7cc844" # base0B
    cyan: "#52cbb0" # base0C
    blue: "#33b5e1" # base0D
    magenta: "#a363d5" # base0E
    white: "#a6afb8" # base05

  normal:
    black: "#667581" # base03
    red: "#ef5253" # base08
    yellow: "#e4b51c" # base0A
    green: "#7cc844" # base0B
    cyan: "#52cbb0" # base0C
    blue: "#33b5e1" # base0D
    magenta: "#a363d5" # base0E
    white: "#f5f7fa" # base07
