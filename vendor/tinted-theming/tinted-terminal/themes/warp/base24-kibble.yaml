# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Kibble by FredHappyface (https://github.com/fredHappyface)

name: Base24 Kibble
accent: "#3449d1" # base0D
cursor: "#c0b3c0" # base05
background: "#0e100a" # base00
foreground: "#c0b3c0" # base05
details: darker

terminal_colors:
  normal:
    black: "#0e100a" # base00
    red: "#c70031" # base08
    yellow: "#97a4f7" # base0A
    green: "#29cf13" # base0B
    cyan: "#0798ab" # base0C
    blue: "#3449d1" # base0D
    magenta: "#8400ff" # base0E
    white: "#c0b3c0" # base05

  bright:
    black: "#7c777c" # base03
    red: "#f01578" # base12
    yellow: "#f3f79e" # base13
    green: "#6ce05c" # base14
    cyan: "#68f2e0" # base15
    blue: "#97a4f7" # base16
    magenta: "#c495f0" # base17
    white: "#ffffff" # base07
