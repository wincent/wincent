# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Atelier Plateau by Bram de Haan (http://atelierbramdehaan.nl)

name: Base16 Atelier Plateau
accent: "#7272ca" # base0D
cursor: "#8a8585" # base05
background: "#1b1818" # base00
