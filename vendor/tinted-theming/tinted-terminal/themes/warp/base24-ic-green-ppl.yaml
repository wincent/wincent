# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: IC-Green-PPL by FredHappyface (https://github.com/fredHappyface)

name: Base24 IC-Green-PPL
accent: "#2ec3b9" # base0D
cursor: "#add5b6" # base05
background: "#2c2c2c" # base00
foreground: "#add5b6" # base05
details: darker

terminal_colors:
  normal:
    black: "#2c2c2c" # base00
    red: "#fe2635" # base08
    yellow: "#2efaeb" # base0A
    green: "#41a638" # base0B
    cyan: "#3ca078" # base0C
    blue: "#2ec3b9" # base0D
    magenta: "#50a096" # base0E
    white: "#add5b6" # base05

  bright:
    black: "#3b843e" # base03
    red: "#b4fa5c" # base12
    yellow: "#dafa87" # base13
    green: "#aefa86" # base14
    cyan: "#3cfac8" # base15
    blue: "#2efaeb" # base16
    magenta: "#50fafa" # base17
    white: "#e0f1dc" # base07
