# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Da One Gray by NNB (https://github.com/NNBnh)

name: Base16 Da One Gray
accent: "#6bb8ff" # base0D
cursor: "#ffffff" # base05
background: "#181818" # base00
foreground: "#ffffff" # base05
details: darker

terminal_colors:
