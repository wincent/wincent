    blue: "#bd6c00" # base0D
    magenta: "#fb5d00" # base0E
    white: "#d9a971" # base05

  bright:
    black: "#8f6c41" # base03
    red: "#ff8b67" # base12
    yellow: "#ffe36e" # base13
    green: "#f6ff3f" # base14
