# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: IC-Orange-PPL by FredHappyface (https://github.com/fredHappyface)

name: Base24 IC-Orange-PPL
accent: "#bd6c00" # base0D
cursor: "#d9a971" # base05
background: "#262626" # base00
foreground: "#d9a971" # base05
details: darker

terminal_colors:
  normal:
    black: "#262626" # base00
    red: "#c03900" # base08
    yellow: "#ffbd54" # base0A
    green: "#a3a900" # base0B
