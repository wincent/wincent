# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Jabuti by https://github.com/notusknot

name: Base16 Jabuti
accent: "#3fc6de" # base0D
cursor: "#c0cbe3" # base05
background: "#292a37" # base00
foreground: "#c0cbe3" # base05
details: darker

terminal_colors:
  bright:
    black: "#292a37" # base00
    red: "#ec6a88" # base08
    yellow: "#e1c697" # base0A
    green: "#3fdaa4" # base0B
    cyan: "#ff7eb6" # base0C
    blue: "#3fc6de" # base0D
    magenta: "#be95ff" # base0E
    white: "#c0cbe3" # base05

  normal:
    black: "#45475d" # base03
    red: "#ec6a88" # base08
    yellow: "#e1c697" # base0A
    green: "#3fdaa4" # base0B
    cyan: "#ff7eb6" # base0C
    blue: "#3fc6de" # base0D
    magenta: "#be95ff" # base0E
    white: "#ffffff" # base07
