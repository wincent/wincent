# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Grayscale Light by Alexandre Gavioli (https://github.com/Alexx2/)

name: Base16 Grayscale Light
accent: "#686868" # base0D
cursor: "#464646" # base05
background: "#f7f7f7" # base00
foreground: "#464646" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f7f7f7" # base00
    red: "#7c7c7c" # base08
    yellow: "#a0a0a0" # base0A
    green: "#8e8e8e" # base0B
    cyan: "#868686" # base0C
    blue: "#686868" # base0D
    magenta: "#747474" # base0E
    white: "#464646" # base05

  normal:
    black: "#ababab" # base03
    red: "#7c7c7c" # base08
    yellow: "#a0a0a0" # base0A
    green: "#8e8e8e" # base0B
    cyan: "#868686" # base0C
    blue: "#686868" # base0D
    magenta: "#747474" # base0E
    white: "#101010" # base07
