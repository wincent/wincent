    green: "#387050" # base0B
    cyan: "#287070" # base0C
    blue: "#3468a8" # base0D
    magenta: "#6438a0" # base0E
    white: "#1f1c16" # base05

  normal:
    black: "#91887d" # base03
    red: "#9e3e3e" # base08
    yellow: "#7d6820" # base0A
    green: "#387050" # base0B
    cyan: "#287070" # base0C
    blue: "#3468a8" # base0D
