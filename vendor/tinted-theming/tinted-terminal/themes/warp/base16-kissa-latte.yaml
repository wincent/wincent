# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Kissa Latte by rwendell (https://github.com/rwendell/kissa)

name: Base16 Kissa Latte
accent: "#3468a8" # base0D
cursor: "#1f1c16" # base05
background: "#f5f4f0" # base00
foreground: "#1f1c16" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f5f4f0" # base00
    red: "#9e3e3e" # base08
