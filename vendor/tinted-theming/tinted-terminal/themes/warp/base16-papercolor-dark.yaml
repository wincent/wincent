# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: PaperColor Dark by Jon Leopard (http://github.com/jonleopard), Tinted Theming (https://github.com/tinted-theming), based on PaperColor Theme (https://github.com/NLKNguyen/papercolor-theme)

name: Base16 PaperColor Dark
accent: "#5fafd7" # base0D
cursor: "#9e9e9e" # base05
background: "#1c1c1c" # base00
foreground: "#9e9e9e" # base05
details: darker

terminal_colors:
  bright:
    black: "#1c1c1c" # base00
    red: "#ff5faf" # base08
    yellow: "#ffaf00" # base0A
    green: "#5faf5f" # base0B
    cyan: "#00afaf" # base0C
    blue: "#5fafd7" # base0D
    magenta: "#af87d7" # base0E
    white: "#9e9e9e" # base05

  normal:
    black: "#585858" # base03
    red: "#ff5faf" # base08
    yellow: "#ffaf00" # base0A
    green: "#5faf5f" # base0B
    cyan: "#00afaf" # base0C
    blue: "#5fafd7" # base0D
    magenta: "#af87d7" # base0E
    white: "#d0d0d0" # base07
