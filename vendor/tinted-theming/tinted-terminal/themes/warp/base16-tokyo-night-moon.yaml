# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Tokyo Night Moon by Ólafur Bjarki Bogason

name: Base16 Tokyo Night Moon
accent: "#82aaff" # base0D
cursor: "#828bb8" # base05
background: "#222436" # base00
foreground: "#828bb8" # base05
details: darker

terminal_colors:
  bright:
    black: "#222436" # base00
    red: "#ff757f" # base08
    yellow: "#ffdf77" # base0A
    green: "#c3e88d" # base0B
    cyan: "#86e1fc" # base0C
    blue: "#82aaff" # base0D
    magenta: "#fca7ea" # base0E
    white: "#828bb8" # base05

  normal:
    black: "#3b4261" # base03
    red: "#ff757f" # base08
    yellow: "#ffdf77" # base0A
    green: "#c3e88d" # base0B
    cyan: "#86e1fc" # base0C
    blue: "#82aaff" # base0D
    magenta: "#fca7ea" # base0E
    white: "#c8d3f5" # base07
