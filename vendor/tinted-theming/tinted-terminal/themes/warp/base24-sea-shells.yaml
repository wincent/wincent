# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Sea Shells by FredHappyface (https://github.com/fredHappyface)

name: Base24 Sea Shells
accent: "#1e4950" # base0D
cursor: "#b79c7e" # base05
background: "#08131a" # base00
foreground: "#b79c7e" # base05
details: darker

terminal_colors:
  normal:
    black: "#08131a" # base00
    red: "#d15023" # base08
    yellow: "#1bbcdd" # base0A
    green: "#027c9b" # base0B
    cyan: "#50a3b5" # base0C
    blue: "#1e4950" # base0D
    magenta: "#68d3f1" # base0E
    white: "#b79c7e" # base05

  bright:
    black: "#696660" # base03
    red: "#d38677" # base12
    yellow: "#fdd29e" # base13
    green: "#618c98" # base14
    cyan: "#86abb3" # base15
    blue: "#1bbcdd" # base16
    magenta: "#bbe3ee" # base17
    white: "#fee3cd" # base07
