# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Front End Delight by FredHappyface (https://github.com/fredHappyface)

name: Base24 Front End Delight
accent: "#2c70b7" # base0D
cursor: "#98ac9c" # base05
