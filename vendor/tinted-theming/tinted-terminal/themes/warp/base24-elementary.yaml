# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Elementary by FredHappyface (https://github.com/fredHappyface)

name: Base24 Elementary
accent: "#053a8c" # base0D
cursor: "#c5c5c5" # base05
background: "#181818" # base00
foreground: "#c5c5c5" # base05
details: darker

terminal_colors:
  normal:
    black: "#181818" # base00
    red: "#d61b15" # base08
    yellow: "#0855fe" # base0A
    green: "#59a413" # base0B
    cyan: "#2594e0" # base0C
    blue: "#053a8c" # base0D
    magenta: "#e40038" # base0E
    white: "#c5c5c5" # base05

  bright:
    black: "#737373" # base03
    red: "#fb1b18" # base12
    yellow: "#fdc70e" # base13
    green: "#6ac118" # base14
    cyan: "#3ea7fc" # base15
    blue: "#0855fe" # base16
    magenta: "#fb004f" # base17
    white: "#8c00eb" # base07
