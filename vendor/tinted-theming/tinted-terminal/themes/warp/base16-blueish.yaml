# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Blueish by Ben Mayoras

name: Base16 Blueish
accent: "#82aaff" # base0D
cursor: "#c8e1f8" # base05
background: "#182430" # base00
foreground: "#c8e1f8" # base05
details: darker

terminal_colors:
  bright:
    black: "#182430" # base00
    red: "#4ce587" # base08
    yellow: "#f6cd5c" # base0A
    green: "#c3e88d" # base0B
    cyan: "#5fd1ff" # base0C
    blue: "#82aaff" # base0D
    magenta: "#ff84dd" # base0E
    white: "#c8e1f8" # base05

  normal:
    black: "#616d78" # base03
    red: "#4ce587" # base08
    yellow: "#f6cd5c" # base0A
    green: "#c3e88d" # base0B
    cyan: "#5fd1ff" # base0C
    blue: "#82aaff" # base0D
    magenta: "#ff84dd" # base0E
    white: "#8f98a0" # base07
