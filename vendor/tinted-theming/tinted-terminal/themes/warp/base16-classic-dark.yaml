# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Classic Dark by Jason Heeris (http://heeris.id.au)

name: Base16 Classic Dark
accent: "#6a9fb5" # base0D
cursor: "#d0d0d0" # base05
background: "#151515" # base00
foreground: "#d0d0d0" # base05
details: darker

terminal_colors:
  bright:
    black: "#151515" # base00
    red: "#ac4142" # base08
    yellow: "#f4bf75" # base0A
    green: "#90a959" # base0B
    cyan: "#75b5aa" # base0C
    blue: "#6a9fb5" # base0D
    magenta: "#aa759f" # base0E
    white: "#d0d0d0" # base05

  normal:
    black: "#505050" # base03
    red: "#ac4142" # base08
    yellow: "#f4bf75" # base0A
    green: "#90a959" # base0B
    cyan: "#75b5aa" # base0C
    blue: "#6a9fb5" # base0D
    magenta: "#aa759f" # base0E
    white: "#f5f5f5" # base07
