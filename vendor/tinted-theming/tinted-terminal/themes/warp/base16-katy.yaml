# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Katy by George Essig (https://github.com/gessig)

name: Base16 Katy
accent: "#82aaff" # base0D
cursor: "#959dcb" # base05
background: "#292d3e" # base00
foreground: "#959dcb" # base05
details: darker

terminal_colors:
  bright:
    black: "#292d3e" # base00
    red: "#6e98e1" # base08
    yellow: "#e0a557" # base0A
    green: "#78c06e" # base0B
    cyan: "#83b7e5" # base0C
    blue: "#82aaff" # base0D
    magenta: "#c792ea" # base0E
    white: "#959dcb" # base05

  normal:
    black: "#676e95" # base03
    red: "#6e98e1" # base08
    yellow: "#e0a557" # base0A
    green: "#78c06e" # base0B
