# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Helios by Alex Meyer (https://github.com/reyemxela)

name: Base16 Helios
accent: "#1e8bac" # base0D
cursor: "#d5d5d5" # base05
background: "#1d2021" # base00
foreground: "#d5d5d5" # base05
details: darker

terminal_colors:
  bright:
    black: "#1d2021" # base00
    red: "#d72638" # base08
    yellow: "#f19d1a" # base0A
    green: "#88b92d" # base0B
    cyan: "#1ba595" # base0C
    blue: "#1e8bac" # base0D
    magenta: "#be4264" # base0E
    white: "#d5d5d5" # base05

  normal:
    black: "#6f7579" # base03
    red: "#d72638" # base08
    yellow: "#f19d1a" # base0A
    green: "#88b92d" # base0B
    cyan: "#1ba595" # base0C
    blue: "#1e8bac" # base0D
    magenta: "#be4264" # base0E
    white: "#e5e5e5" # base07
