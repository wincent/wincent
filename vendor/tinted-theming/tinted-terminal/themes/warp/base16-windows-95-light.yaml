# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Windows 95 Light by Fergus Collins (https://github.com/ferguscollins)

name: Base16 Windows 95 Light
accent: "#0000a8" # base0D
cursor: "#545454" # base05
background: "#fcfcfc" # base00
foreground: "#545454" # base05
details: lighter

terminal_colors:
  bright:
    black: "#fcfcfc" # base00
    red: "#a80000" # base08
    yellow: "#a85400" # base0A
    green: "#00a800" # base0B
    cyan: "#00a8a8" # base0C
    blue: "#0000a8" # base0D
    magenta: "#a800a8" # base0E
    white: "#545454" # base05

  normal:
    black: "#a8a8a8" # base03
    red: "#a80000" # base08
    yellow: "#a85400" # base0A
    green: "#00a800" # base0B
    cyan: "#00a8a8" # base0C
    blue: "#0000a8" # base0D
    magenta: "#a800a8" # base0E
    white: "#000000" # base07
