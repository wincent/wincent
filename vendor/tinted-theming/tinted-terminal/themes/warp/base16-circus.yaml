# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Circus by Stephan Boyer (https://github.com/stepchowfun) and Esther Wang (https://github.com/ewang12)

name: Base16 Circus
accent: "#639ee4" # base0D
cursor: "#a7a7a7" # base05
background: "#191919" # base00
foreground: "#a7a7a7" # base05
details: darker

terminal_colors:
  bright:
    black: "#191919" # base00
    red: "#dc657d" # base08
    yellow: "#c3ba63" # base0A
    green: "#84b97c" # base0B
    cyan: "#4bb1a7" # base0C
    blue: "#639ee4" # base0D
    magenta: "#b888e2" # base0E
    white: "#a7a7a7" # base05

  normal:
    black: "#5f5a60" # base03
    red: "#dc657d" # base08
    yellow: "#c3ba63" # base0A
    green: "#84b97c" # base0B
    cyan: "#4bb1a7" # base0C
    blue: "#639ee4" # base0D
    magenta: "#b888e2" # base0E
    white: "#ffffff" # base07
