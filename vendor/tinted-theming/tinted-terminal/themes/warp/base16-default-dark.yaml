# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Default Dark by Chris Kempson (http://chriskempson.com)

name: Base16 Default Dark
accent: "#7cafc2" # base0D
cursor: "#d8d8d8" # base05
background: "#181818" # base00
foreground: "#d8d8d8" # base05
details: darker

terminal_colors:
  bright:
    black: "#181818" # base00
    red: "#ab4642" # base08
    yellow: "#f7ca88" # base0A
    green: "#a1b56c" # base0B
    cyan: "#86c1b9" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#ba8baf" # base0E
    white: "#d8d8d8" # base05

  normal:
    black: "#585858" # base03
    red: "#ab4642" # base08
    yellow: "#f7ca88" # base0A
    green: "#a1b56c" # base0B
    cyan: "#86c1b9" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#ba8baf" # base0E
    white: "#f8f8f8" # base07
