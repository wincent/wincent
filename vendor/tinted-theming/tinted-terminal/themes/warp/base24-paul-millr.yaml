# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Paul Millr by FredHappyface (https://github.com/fredHappyface)

name: Base24 Paul Millr
accent: "#386bd7" # base0D
cursor: "#a5a5a5" # base05
background: "#000000" # base00
foreground: "#a5a5a5" # base05
details: darker

terminal_colors:
  normal:
    black: "#000000" # base00
    red: "#ff0000" # base08
    yellow: "#709aed" # base0A
    green: "#79ff0f" # base0B
    cyan: "#66ccff" # base0C
    blue: "#386bd7" # base0D
    magenta: "#b349be" # base0E
    white: "#a5a5a5" # base05

  bright:
    black: "#7b7b7b" # base03
    red: "#ff0080" # base12
    yellow: "#f3d64e" # base13
    green: "#66ff66" # base14
    cyan: "#79dff2" # base15
    blue: "#709aed" # base16
    magenta: "#db67e6" # base17
    white: "#ffffff" # base07
