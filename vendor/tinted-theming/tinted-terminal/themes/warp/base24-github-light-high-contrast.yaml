# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Github Light High Contrast by Tinted Theming (https://github.com/tinted-theming)

name: Base24 Github Light High Contrast
accent: "#622cbc" # base0D
