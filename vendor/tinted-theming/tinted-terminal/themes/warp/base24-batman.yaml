# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Batman by FredHappyface (https://github.com/fredHappyface)

name: Base24 Batman
accent: "#737074" # base0D
cursor: "#a7a8a3" # base05
background: "#1b1d1e" # base00
foreground: "#a7a8a3" # base05
details: darker

terminal_colors:
