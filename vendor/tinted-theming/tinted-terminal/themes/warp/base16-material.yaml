# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Material by Nate Peterson

name: Base16 Material
accent: "#82aaff" # base0D
cursor: "#eeffff" # base05
background: "#263238" # base00
foreground: "#eeffff" # base05
details: darker

terminal_colors:
  bright:
    black: "#263238" # base00
    red: "#f07178" # base08
    yellow: "#ffcb6b" # base0A
    green: "#c3e88d" # base0B
    cyan: "#89ddff" # base0C
    blue: "#82aaff" # base0D
    magenta: "#c792ea" # base0E
    white: "#eeffff" # base05

  normal:
    black: "#546e7a" # base03
    red: "#f07178" # base08
    yellow: "#ffcb6b" # base0A
    green: "#c3e88d" # base0B
    cyan: "#89ddff" # base0C
    blue: "#82aaff" # base0D
    magenta: "#c792ea" # base0E
    white: "#ffffff" # base07
