# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Ayu Mirage by Tinted Theming (https://github.com/tinted-theming), Ayu Theme (https://github.com/ayu-theme)

name: Base24 Ayu Mirage
accent: "#73d0ff" # base0D
cursor: "#cccac2" # base05
background: "#1f2430" # base00
foreground: "#cccac2" # base05
details: darker

terminal_colors:
  normal:
    black: "#1f2430" # base00
    red: "#f28779" # base08
    yellow: "#ffd173" # base0A
    green: "#d5ff80" # base0B
    cyan: "#95e6cb" # base0C
    blue: "#73d0ff" # base0D
    magenta: "#d4bfff" # base0E
    white: "#cccac2" # base05

  bright:
    black: "#4a5059" # base03
    red: "#ff6666" # base12
    yellow: "#ffcc66" # base13
    green: "#87d963" # base14
    cyan: "#5ccfe6" # base15
    blue: "#80b0ff" # base16
    magenta: "#b692ff" # base17
    white: "#f3f4f5" # base07
