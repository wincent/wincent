# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Night Lion V2 by FredHappyface (https://github.com/fredHappyface)

name: Base24 Night Lion V2
accent: "#63d0f0" # base0D
cursor: "#a1a1a1" # base05
background: "#171717" # base00
foreground: "#a1a1a1" # base05
details: darker

terminal_colors:
  normal:
    black: "#171717" # base00
    red: "#bb0000" # base08
    yellow: "#62cae7" # base0A
    green: "#03f622" # base0B
    cyan: "#00d9df" # base0C
    blue: "#63d0f0" # base0D
    magenta: "#ce6fda" # base0E
    white: "#a1a1a1" # base05

  bright:
    black: "#6e6e6e" # base03
    red: "#ff5555" # base12
    yellow: "#ffff55" # base13
    green: "#7df61c" # base14
    cyan: "#00ccd7" # base15
    blue: "#62cae7" # base16
    magenta: "#ff9af5" # base17
    white: "#ffffff" # base07
