# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Colors by mrmrs (http://clrs.cc)

name: Base16 Colors
accent: "#0074d9" # base0D
cursor: "#bbbbbb" # base05
background: "#111111" # base00
foreground: "#bbbbbb" # base05
details: darker

terminal_colors:
  bright:
    black: "#111111" # base00
    red: "#ff4136" # base08
    yellow: "#ffdc00" # base0A
    green: "#2ecc40" # base0B
    cyan: "#7fdbff" # base0C
    blue: "#0074d9" # base0D
    magenta: "#b10dc9" # base0E
    white: "#bbbbbb" # base05

  normal:
    black: "#777777" # base03
    red: "#ff4136" # base08
    yellow: "#ffdc00" # base0A
    green: "#2ecc40" # base0B
    cyan: "#7fdbff" # base0C
    blue: "#0074d9" # base0D
    magenta: "#b10dc9" # base0E
    white: "#ffffff" # base07
