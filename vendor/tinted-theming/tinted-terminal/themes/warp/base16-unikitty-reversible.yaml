# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Unikitty Reversible by Josh W Lewis (@joshwlewis)

name: Base16 Unikitty Reversible
accent: "#7864fa" # base0D
cursor: "#c3c2c4" # base05
background: "#2e2a31" # base00
foreground: "#c3c2c4" # base05
details: darker

terminal_colors:
  bright:
    black: "#2e2a31" # base00
    red: "#d8137f" # base08
    yellow: "#dc8a0e" # base0A
    green: "#17ad98" # base0B
    cyan: "#149bda" # base0C
