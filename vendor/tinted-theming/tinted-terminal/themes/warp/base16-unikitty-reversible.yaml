    magenta: "#b33ce8" # base0E
    white: "#c3c2c4" # base05

  normal:
    black: "#878589" # base03
    red: "#d8137f" # base08
    yellow: "#dc8a0e" # base0A
    green: "#17ad98" # base0B
    cyan: "#149bda" # base0C
    blue: "#7864fa" # base0D
    magenta: "#b33ce8" # base0E
    white: "#ffffff" # base07
