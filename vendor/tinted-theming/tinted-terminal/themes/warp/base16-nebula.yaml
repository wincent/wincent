# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Nebula by Gabriel Fontes (https://github.com/Misterio77)

name: Base16 Nebula
accent: "#4d6bb6" # base0D
cursor: "#a4a6a9" # base05
background: "#22273b" # base00
foreground: "#a4a6a9" # base05
details: darker

terminal_colors:
  bright:
    black: "#22273b" # base00
    red: "#777abc" # base08
    yellow: "#4f9062" # base0A
    green: "#6562a8" # base0B
    cyan: "#226f68" # base0C
    blue: "#4d6bb6" # base0D
    magenta: "#716cae" # base0E
    white: "#a4a6a9" # base05

  normal:
    black: "#6e6f72" # base03
    red: "#777abc" # base08
    yellow: "#4f9062" # base0A
    green: "#6562a8" # base0B
    cyan: "#226f68" # base0C
    blue: "#4d6bb6" # base0D
    magenta: "#716cae" # base0E
    white: "#8dbdaa" # base07
