# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Kanagawa Dragon by Stefan Weigl-Bosker (https://github.com/sweiglbosker), Tommaso Laurenzi (https://github.com/rebelot/kanagawa.nvim)

name: Base16 Kanagawa Dragon
accent: "#8ba4b0" # base0D
cursor: "#c5c9c5" # base05
background: "#181616" # base00
foreground: "#c5c9c5" # base05
details: darker

terminal_colors:
  bright:
    black: "#181616" # base00
    red: "#c4746e" # base08
    yellow: "#c4b28a" # base0A
    green: "#8a9a7b" # base0B
    cyan: "#8ea4a2" # base0C
    blue: "#8ba4b0" # base0D
    magenta: "#a292a3" # base0E
    white: "#c5c9c5" # base05

  normal:
    black: "#625e5a" # base03
    red: "#c4746e" # base08
    yellow: "#c4b28a" # base0A
    green: "#8a9a7b" # base0B
    cyan: "#8ea4a2" # base0C
    blue: "#8ba4b0" # base0D
    magenta: "#a292a3" # base0E
    white: "#c5c9c5" # base07
