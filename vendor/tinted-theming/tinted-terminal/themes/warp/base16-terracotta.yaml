    blue: "#625574" # base0D
    magenta: "#8d5968" # base0E
    white: "#473731" # base05

  normal:
    black: "#c0aca4" # base03
    red: "#a75045" # base08
    yellow: "#ce943e" # base0A
    green: "#7a894a" # base0B
