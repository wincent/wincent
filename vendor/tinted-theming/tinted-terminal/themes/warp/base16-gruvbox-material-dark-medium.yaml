    green: "#a9b665" # base0B
    cyan: "#89b482" # base0C
    blue: "#7daea3" # base0D
    magenta: "#d3869b" # base0E
    white: "#ddc7a1" # base05

  normal:
    black: "#665c54" # base03
    red: "#ea6962" # base08
    yellow: "#d8a657" # base0A
    green: "#a9b665" # base0B
    cyan: "#89b482" # base0C
    blue: "#7daea3" # base0D
    magenta: "#d3869b" # base0E
    white: "#fbf1c7" # base07
