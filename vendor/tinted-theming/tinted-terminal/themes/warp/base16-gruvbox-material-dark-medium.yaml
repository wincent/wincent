# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Gruvbox Material Dark, Medium by Mayush Kumar (https://github.com/MayushKumar), sainnhe (https://github.com/sainnhe/gruvbox-material-vscode)

name: Base16 Gruvbox Material Dark, Medium
accent: "#7daea3" # base0D
cursor: "#ddc7a1" # base05
background: "#292828" # base00
foreground: "#ddc7a1" # base05
details: darker

terminal_colors:
  bright:
    black: "#292828" # base00
    red: "#ea6962" # base08
