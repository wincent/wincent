# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Swamp Light by Masroof Maindak (https://github.com/masroof-maindak)

name: Base16 Swamp Light
accent: "#bf7979" # base0D
cursor: "#64513e" # base05
background: "#f1e3d1" # base00
foreground: "#64513e" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f1e3d1" # base00
    red: "#d09700" # base08
    yellow: "#993333" # base0A
    green: "#908d6a" # base0B
    cyan: "#d09700" # base0C
    blue: "#bf7979" # base0D
    magenta: "#9e5581" # base0E
    white: "#64513e" # base05

  normal:
    black: "#b5a492" # base03
    red: "#d09700" # base08
    yellow: "#993333" # base0A
    green: "#908d6a" # base0B
    cyan: "#d09700" # base0C
    blue: "#bf7979" # base0D
    magenta: "#9e5581" # base0E
    white: "#8c7b68" # base07
