# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Chalk by FredHappyface (https://github.com/fredHappyface)

name: Base24 Chalk
accent: "#5ab9ed" # base0D
cursor: "#d0d0d0" # base05
background: "#151515" # base00
foreground: "#d0d0d0" # base05
details: darker

terminal_colors:
  normal:
    black: "#151515" # base00
    red: "#fa859c" # base08
    yellow: "#ddb26f" # base0A
    green: "#a1bb54" # base0B
    cyan: "#10bcad" # base0C
    blue: "#5ab9ed" # base0D
    magenta: "#db8fea" # base0E
    white: "#d0d0d0" # base05

  bright:
    black: "#505050" # base03
    red: "#fb9fb1" # base12
    yellow: "#eda987" # base13
    green: "#acc267" # base14
    cyan: "#12cfc0" # base15
    blue: "#6fc2ef" # base16
    magenta: "#e1a3ee" # base17
    white: "#f5f5f5" # base07
