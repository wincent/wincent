# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Horizon Light by Michaël Ball (http://github.com/michael-ball/)

name: Base16 Horizon Light
accent: "#da103f" # base0D
cursor: "#403c3d" # base05
background: "#fdf0ed" # base00
foreground: "#403c3d" # base05
details: lighter

terminal_colors:
  bright:
    black: "#fdf0ed" # base00
    red: "#f7939b" # base08
    yellow: "#fbe0d9" # base0A
    green: "#94e1b0" # base0B
    cyan: "#dc3318" # base0C
    blue: "#da103f" # base0D
    magenta: "#1d8991" # base0E
    white: "#403c3d" # base05

  normal:
    black: "#bdb3b1" # base03
    red: "#f7939b" # base08
    yellow: "#fbe0d9" # base0A
    green: "#94e1b0" # base0B
    cyan: "#dc3318" # base0C
    blue: "#da103f" # base0D
    magenta: "#1d8991" # base0E
    white: "#201c1d" # base07
