# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Hopscotch by Jan T. Sott

name: Base16 Hopscotch
accent: "#1290bf" # base0D
cursor: "#b9b5b8" # base05
background: "#322931" # base00
foreground: "#b9b5b8" # base05
details: darker

terminal_colors:
  bright:
    black: "#322931" # base00
    red: "#dd464c" # base08
    yellow: "#fdcc59" # base0A
    green: "#8fc13e" # base0B
    cyan: "#149b93" # base0C
    blue: "#1290bf" # base0D
    magenta: "#c85e7c" # base0E
    white: "#b9b5b8" # base05

  normal:
    black: "#797379" # base03
    red: "#dd464c" # base08
    yellow: "#fdcc59" # base0A
    green: "#8fc13e" # base0B
    cyan: "#149b93" # base0C
    blue: "#1290bf" # base0D
    magenta: "#c85e7c" # base0E
    white: "#ffffff" # base07
