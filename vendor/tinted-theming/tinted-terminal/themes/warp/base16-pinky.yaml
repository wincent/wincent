# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: pinky by Benjamin (https://github.com/b3nj5m1n)

name: Base16 pinky
accent: "#00ffff" # base0D
cursor: "#f5f5f5" # base05
background: "#171517" # base00
foreground: "#f5f5f5" # base05
details: darker

terminal_colors:
  bright:
    black: "#171517" # base00
    red: "#ffa600" # base08
    yellow: "#20df6c" # base0A
    green: "#ff0066" # base0B
    cyan: "#6600ff" # base0C
    blue: "#00ffff" # base0D
    magenta: "#007fff" # base0E
    white: "#f5f5f5" # base05

  normal:
    black: "#383338" # base03
    red: "#ffa600" # base08
    yellow: "#20df6c" # base0A
    green: "#ff0066" # base0B
    cyan: "#6600ff" # base0C
    blue: "#00ffff" # base0D
    magenta: "#007fff" # base0E
    white: "#f7f3f7" # base07
