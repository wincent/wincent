# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Tokyo Night Storm by Michaël Ball, based on Tokyo Night by enkia (https://github.com/enkia/tokyo-night-vscode-theme)

name: Base24 Tokyo Night Storm
accent: "#2ac3de" # base0D
cursor: "#a9b1d6" # base05
background: "#24283b" # base00
foreground: "#a9b1d6" # base05
details: darker

terminal_colors:
  normal:
    black: "#24283b" # base00
    red: "#c0caf5" # base08
    yellow: "#0db9d7" # base0A
    green: "#9ece6a" # base0B
    cyan: "#b4f9f8" # base0C
    blue: "#2ac3de" # base0D
    magenta: "#bb9af7" # base0E
    white: "#a9b1d6" # base05

  bright:
    black: "#444b6a" # base03
    red: "#ff7a93" # base12
    yellow: "#ff9e64" # base13
    green: "#73daca" # base14
    cyan: "#7dcfff" # base15
    blue: "#89ddff" # base16
    magenta: "#bb9af7" # base17
    white: "#d5d6db" # base07
