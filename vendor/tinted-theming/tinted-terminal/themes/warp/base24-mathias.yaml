# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Mathias by FredHappyface (https://github.com/fredHappyface)

name: Base24 Mathias
accent: "#c48dff" # base0D
cursor: "#cacaca" # base05
background: "#000000" # base00
foreground: "#cacaca" # base05
details: darker

terminal_colors:
  normal:
    black: "#000000" # base00
    red: "#e52222" # base08
    yellow: "#5555ff" # base0A
    green: "#a6e32d" # base0B
    cyan: "#67d9f0" # base0C
    blue: "#c48dff" # base0D
    magenta: "#fa2573" # base0E
    white: "#cacaca" # base05

  bright:
    black: "#7c7c7c" # base03
    red: "#ff5555" # base12
    yellow: "#ffff55" # base13
    green: "#55ff55" # base14
    cyan: "#55ffff" # base15
    blue: "#5555ff" # base16
    magenta: "#ff55ff" # base17
    white: "#ffffff" # base07
