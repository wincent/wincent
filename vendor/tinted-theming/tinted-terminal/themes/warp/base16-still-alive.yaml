# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Still Alive by Derrick McKee (derrick.mckee@gmail.com), Tinted Theming (https://github.com/tinted-theming)

name: Base16 Still Alive
accent: "#365eff" # base0D
cursor: "#4c383b" # base05
background: "#f0f0f0" # base00
foreground: "#4c383b" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f0f0f0" # base00
    red: "#d80000" # base08
    yellow: "#fff018" # base0A
    green: "#30a860" # base0B
    cyan: "#36d3ff" # base0C
    blue: "#365eff" # base0D
    magenta: "#9036ff" # base0E
    white: "#4c383b" # base05

  normal:
    black: "#a3a3a3" # base03
    red: "#d80000" # base08
    yellow: "#fff018" # base0A
    green: "#30a860" # base0B
    cyan: "#36d3ff" # base0C
    blue: "#365eff" # base0D
    magenta: "#9036ff" # base0E
    white: "#140c0d" # base07
