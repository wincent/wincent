# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Shades Of Purple by FredHappyface (https://github.com/fredHappyface)

name: Base24 Shades Of Purple
accent: "#6943ff" # base0D
cursor: "#afafaf" # base05
background: "#1e1d40" # base00
foreground: "#afafaf" # base05
details: darker

terminal_colors:
  normal:
    black: "#1e1d40" # base00
    red: "#d90429" # base08
    yellow: "#6871ff" # base0A
    green: "#3ad900" # base0B
    cyan: "#00c5c7" # base0C
    blue: "#6943ff" # base0D
    magenta: "#ff2b70" # base0E
    white: "#afafaf" # base05

  bright:
    black: "#7f7f7f" # base03
    red: "#f9291b" # base12
