# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Builtin Tango Dark by FredHappyface (https://github.com/fredHappyface)

name: Base24 Builtin Tango Dark
accent: "#3464a4" # base0D
cursor: "#b3b7b0" # base05
background: "#000000" # base00
foreground: "#b3b7b0" # base05
details: darker

terminal_colors:
  normal:
    black: "#000000" # base00
    red: "#cc0000" # base08
    yellow: "#719ecf" # base0A
    green: "#4e9a05" # base0B
    cyan: "#05989a" # base0C
    blue: "#3464a4" # base0D
    magenta: "#74507a" # base0E
    white: "#b3b7b0" # base05

  bright:
    black: "#737772" # base03
    red: "#ef2828" # base12
    yellow: "#fce94e" # base13
    green: "#8ae234" # base14
    cyan: "#34e2e2" # base15
    blue: "#719ecf" # base16
    magenta: "#ad7ea7" # base17
    white: "#ededec" # base07
