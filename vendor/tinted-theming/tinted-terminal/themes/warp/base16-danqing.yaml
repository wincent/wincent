# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: DanQing by Wenhan Zhu (Cosmos) (zhuwenhan950913@gmail.com)

name: Base16 DanQing
accent: "#b0a4e3" # base0D
cursor: "#e0f0ef" # base05
background: "#2d302f" # base00
foreground: "#e0f0ef" # base05
details: darker

terminal_colors:
  bright:
    black: "#2d302f" # base00
    red: "#f9906f" # base08
    yellow: "#f0c239" # base0A
    green: "#8ab361" # base0B
    cyan: "#30dff3" # base0C
    blue: "#b0a4e3" # base0D
    magenta: "#cca4e3" # base0E
    white: "#e0f0ef" # base05

  normal:
    black: "#9da8a3" # base03
    red: "#f9906f" # base08
    yellow: "#f0c239" # base0A
    green: "#8ab361" # base0B
    cyan: "#30dff3" # base0C
    blue: "#b0a4e3" # base0D
    magenta: "#cca4e3" # base0E
    white: "#fcfefd" # base07
