# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Silk Light by Gabriel Fontes (https://github.com/Misterio77)

name: Base16 Silk Light
accent: "#39aac9" # base0D
cursor: "#385156" # base05
background: "#e9f1ef" # base00
foreground: "#385156" # base05
details: lighter

terminal_colors:
  bright:
    black: "#e9f1ef" # base00
    red: "#cf432e" # base08
    yellow: "#cfad25" # base0A
    green: "#6ca38c" # base0B
    cyan: "#329ca2" # base0C
    blue: "#39aac9" # base0D
    magenta: "#6e6582" # base0E
    white: "#385156" # base05

  normal:
    black: "#5c787b" # base03
    red: "#cf432e" # base08
    yellow: "#cfad25" # base0A
    green: "#6ca38c" # base0B
    cyan: "#329ca2" # base0C
    blue: "#39aac9" # base0D
    magenta: "#6e6582" # base0E
    white: "#d2faff" # base07
