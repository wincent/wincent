# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Tokyo Night Moon by Michaël Ball, based on Tokyo Night by enkia (https://github.com/enkia/tokyo-night-vscode-theme)

name: Base24 Tokyo Night Moon
accent: "#82aaff" # base0D
cursor: "#c8d3f5" # base05
background: "#222436" # base00
foreground: "#c8d3f5" # base05
details: darker

terminal_colors:
  normal:
    black: "#222436" # base00
    red: "#c099ff" # base08
    yellow: "#ffc777" # base0A
    green: "#c3e88d" # base0B
    cyan: "#86e1fc" # base0C
    blue: "#82aaff" # base0D
    magenta: "#fca7ea" # base0E
    white: "#c8d3f5" # base05

  bright:
    black: "#444a73" # base03
    red: "#ff757f" # base12
    yellow: "#ffd793" # base13
    green: "#c3e88d" # base14
    cyan: "#86e1fc" # base15
    blue: "#82aaff" # base16
    magenta: "#fca7ea" # base17
    white: "#c8d3f5" # base07
