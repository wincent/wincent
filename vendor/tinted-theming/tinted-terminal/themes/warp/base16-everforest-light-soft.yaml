# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Everforest Light (Soft) by Márcio Sobel (https://github.com/marciosobel)

name: Base16 Everforest Light (Soft)
accent: "#3a94c5" # base0D
cursor: "#5c6a72" # base05
background: "#f3ead3" # base00
foreground: "#5c6a72" # base05
details: lighter

terminal_colors:
