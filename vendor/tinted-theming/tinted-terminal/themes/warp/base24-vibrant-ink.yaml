# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Vibrant Ink by FredHappyface (https://github.com/fredHappyface)

name: Base24 Vibrant Ink
accent: "#44b3cc" # base0D
cursor: "#cdcdcd" # base05
background: "#000000" # base00
foreground: "#cdcdcd" # base05
details: darker

terminal_colors:
  normal:
    black: "#000000" # base00
    red: "#ff6600" # base08
    yellow: "#0000ff" # base0A
    green: "#ccff04" # base0B
    cyan: "#44b3cc" # base0C
    blue: "#44b3cc" # base0D
    magenta: "#9933cc" # base0E
    white: "#cdcdcd" # base05

  bright:
    black: "#7d7d7d" # base03
    red: "#ff0000" # base12
    yellow: "#ffff00" # base13
    green: "#00ff00" # base14
    cyan: "#00ffff" # base15
    blue: "#0000ff" # base16
    magenta: "#ff00ff" # base17
    white: "#e5e5e5" # base07
