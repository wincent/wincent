# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Edge Dark by cjayross (https://github.com/cjayross), Tinted Theming (https://github.com/tinted-theming)

name: Base16 Edge Dark
accent: "#73b3e7" # base0D
cursor: "#afb2b5" # base05
background: "#262729" # base00
foreground: "#afb2b5" # base05
details: darker

terminal_colors:
