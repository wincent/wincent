    magenta: "#d390e7" # base0E
    white: "#afb2b5" # base05

  normal:
    black: "#4a4c4f" # base03
    red: "#e77171" # base08
    yellow: "#dbb774" # base0A
    green: "#a1bf78" # base0B
    cyan: "#5ebaa5" # base0C
    blue: "#73b3e7" # base0D
    magenta: "#d390e7" # base0E
    white: "#e4e5e6" # base07
