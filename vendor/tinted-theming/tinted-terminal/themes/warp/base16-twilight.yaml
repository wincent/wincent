# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Twilight by David Hart (https://github.com/hartbit)

name: Base16 Twilight
accent: "#7587a6" # base0D
cursor: "#a7a7a7" # base05
background: "#1e1e1e" # base00
foreground: "#a7a7a7" # base05
details: darker

terminal_colors:
  bright:
    black: "#1e1e1e" # base00
    red: "#cf6a4c" # base08
    yellow: "#f9ee98" # base0A
    green: "#8f9d6a" # base0B
    cyan: "#afc4db" # base0C
    blue: "#7587a6" # base0D
    magenta: "#9b859d" # base0E
    white: "#a7a7a7" # base05

  normal:
    black: "#5f5a60" # base03
    red: "#cf6a4c" # base08
    yellow: "#f9ee98" # base0A
    green: "#8f9d6a" # base0B
    cyan: "#afc4db" # base0C
    blue: "#7587a6" # base0D
    magenta: "#9b859d" # base0E
    white: "#ffffff" # base07
