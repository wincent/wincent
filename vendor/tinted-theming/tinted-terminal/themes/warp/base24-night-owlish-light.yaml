# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Night Owlish Light by FredHappyface (https://github.com/fredHappyface)

name: Base24 Night Owlish Light
accent: "#4876d6" # base0D
cursor: "#585b5b" # base05
background: "#ffffff" # base00
foreground: "#585b5b" # base05
details: lighter

terminal_colors:
