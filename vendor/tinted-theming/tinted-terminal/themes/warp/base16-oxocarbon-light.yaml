# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Oxocarbon Light by shaunsingh/IBM, Tinted Theming (https://github.com/tinted-theming)

name: Base16 Oxocarbon Light
accent: "#0f62fe" # base0D
cursor: "#525f70" # base05
background: "#f2f4f8" # base00
foreground: "#525f70" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f2f4f8" # base00
    red: "#ff7eb6" # base08
    yellow: "#ff6f00" # base0A
    green: "#42be65" # base0B
    cyan: "#673ab7" # base0C
    blue: "#0f62fe" # base0D
    magenta: "#be95ff" # base0E
    white: "#525f70" # base05

  normal:
    black: "#a1acba" # base03
    red: "#ff7eb6" # base08
    yellow: "#ff6f00" # base0A
    green: "#42be65" # base0B
    cyan: "#673ab7" # base0C
    blue: "#0f62fe" # base0D
    magenta: "#be95ff" # base0E
    white: "#272d35" # base07
