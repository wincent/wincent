# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Atelier Estuary Light by Bram de Haan (http://atelierbramdehaan.nl)

name: Base16 Atelier Estuary Light
accent: "#36a166" # base0D
cursor: "#5f5e4e" # base05
background: "#f4f3ec" # base00
foreground: "#5f5e4e" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f4f3ec" # base00
