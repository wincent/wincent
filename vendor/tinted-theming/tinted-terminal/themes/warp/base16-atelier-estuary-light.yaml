    green: "#7d9726" # base0B
    cyan: "#5b9d48" # base0C
    blue: "#36a166" # base0D
    magenta: "#5f9182" # base0E
    white: "#5f5e4e" # base05

  normal:
    black: "#878573" # base03
    red: "#ba6236" # base08
    yellow: "#a5980d" # base0A
    green: "#7d9726" # base0B
    cyan: "#5b9d48" # base0C
    blue: "#36a166" # base0D
    magenta: "#5f9182" # base0E
    white: "#22221b" # base07
