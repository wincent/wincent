# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Valua by Nonetrix (https://github.com/nonetrix)

name: Base16 Valua
accent: "#4ed2d2" # base0D
cursor: "#98c1a3" # base05
background: "#131f1f" # base00
foreground: "#98c1a3" # base05
details: darker

terminal_colors:
  bright:
    black: "#131f1f" # base00
    red: "#d7586e" # base08
    yellow: "#dfe754" # base0A
    green: "#59d678" # base0B
    cyan: "#76dbd2" # base0C
    blue: "#4ed2d2" # base0D
    magenta: "#a874e0" # base0E
    white: "#98c1a3" # base05

  normal:
    black: "#3e5c53" # base03
    red: "#d7586e" # base08
    yellow: "#dfe754" # base0A
    green: "#59d678" # base0B
    cyan: "#76dbd2" # base0C
    blue: "#4ed2d2" # base0D
    magenta: "#a874e0" # base0E
    white: "#aacbcb" # base07
