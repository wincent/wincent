# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Lab Fox by FredHappyface (https://github.com/fredHappyface)

name: Base24 Lab Fox
accent: "#db3b21" # base0D
cursor: "#cfd0d0" # base05
background: "#2e2e2e" # base00
foreground: "#cfd0d0" # base05
details: darker

terminal_colors:
  normal:
    black: "#2e2e2e" # base00
    red: "#fc6d26" # base08
    yellow: "#db501f" # base0A
    green: "#3eb383" # base0B
    cyan: "#6e49cb" # base0C
    blue: "#db3b21" # base0D
    magenta: "#380d75" # base0E
    white: "#cfd0d0" # base05

  bright:
    black: "#737373" # base03
    red: "#ff6517" # base12
    yellow: "#fca012" # base13
    green: "#52e9a8" # base14
    cyan: "#7d53e7" # base15
    blue: "#db501f" # base16
    magenta: "#441090" # base17
    white: "#feffff" # base07
