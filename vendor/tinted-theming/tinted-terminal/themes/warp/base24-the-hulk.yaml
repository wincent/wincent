# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: The Hulk by FredHappyface (https://github.com/fredHappyface)

name: Base24 The Hulk
accent: "#2424f4" # base0D
cursor: "#b6b6b1" # base05
background: "#1b1d1e" # base00
foreground: "#b6b6b1" # base05
details: darker

terminal_colors:
  normal:
    black: "#1b1d1e" # base00
    red: "#259d1a" # base08
    yellow: "#4f6a95" # base0A
    green: "#13ce2f" # base0B
    cyan: "#378ca9" # base0C
    blue: "#2424f4" # base0D
    magenta: "#641e73" # base0E
    white: "#b6b6b1" # base05

  bright:
    black: "#727473" # base03
    red: "#8dff2a" # base12
    yellow: "#3afe15" # base13
    green: "#48ff76" # base14
    cyan: "#3f85a5" # base15
    blue: "#4f6a95" # base16
    magenta: "#72579d" # base17
    white: "#e5e5e0" # base07
