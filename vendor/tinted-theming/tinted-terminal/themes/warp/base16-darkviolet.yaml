# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Dark Violet by ruler501 (https://github.com/ruler501/base16-darkviolet)

name: Base16 Dark Violet
accent: "#4136d9" # base0D
cursor: "#b08ae6" # base05
