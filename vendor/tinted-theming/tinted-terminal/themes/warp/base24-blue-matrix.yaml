# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Blue Matrix by FredHappyface (https://github.com/fredHappyface)

name: Base24 Blue Matrix
accent: "#00b0fe" # base0D
cursor: "#afafaf" # base05
background: "#0f1115" # base00
foreground: "#afafaf" # base05
details: darker

terminal_colors:
  normal:
    black: "#0f1115" # base00
    red: "#ff567f" # base08
    yellow: "#6871ff" # base0A
    green: "#00ff9b" # base0B
    cyan: "#75c1fe" # base0C
    blue: "#00b0fe" # base0D
    magenta: "#d47bfe" # base0E
    white: "#afafaf" # base05

  bright:
    black: "#7f7f7f" # base03
    red: "#ff6d67" # base12
    yellow: "#fefb67" # base13
    green: "#5ff967" # base14
    cyan: "#5ffdff" # base15
    blue: "#6871ff" # base16
    magenta: "#d582eb" # base17
    white: "#feffff" # base07
