# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Bluloco Light by FredHappyface (https://github.com/fredHappyface)

name: Base24 Bluloco Light
accent: "#1d44dd" # base0D
cursor: "#38383a" # base05
background: "#f7f7f7" # base00
foreground: "#38383a" # base05
details: lighter

terminal_colors:
  normal:
    black: "#f7f7f7" # base00
    red: "#c80d41" # base08
    yellow: "#1085d9" # base0A
    green: "#208839" # base0B
    cyan: "#1e4d7a" # base0C
    blue: "#1d44dd" # base0D
    magenta: "#6d1bed" # base0E
    white: "#38383a" # base05

  bright:
    black: "#a6a7ae" # base03
    red: "#fb496d" # base12
    yellow: "#b79326" # base13
    green: "#34b253" # base14
    cyan: "#5a7fac" # base15
    blue: "#1085d9" # base16
    magenta: "#c00cb2" # base17
    white: "#1c1d21" # base07
