# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Darcula by jetbrains

name: Base16 Darcula
accent: "#9876aa" # base0D
cursor: "#a9b7c6" # base05
background: "#2b2b2b" # base00
foreground: "#a9b7c6" # base05
details: darker

terminal_colors:
  bright:
    black: "#2b2b2b" # base00
