# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: pandora by Cassandra Fox

name: Base16 pandora
accent: "#008080" # base0D
cursor: "#f15c99" # base05
background: "#131213" # base00
foreground: "#f15c99" # base05
details: darker

terminal_colors:
  bright:
    black: "#131213" # base00
    red: "#b00b69" # base08
