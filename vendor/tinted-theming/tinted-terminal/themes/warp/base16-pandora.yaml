    green: "#9ddf69" # base0B
    cyan: "#714ca6" # base0C
    blue: "#008080" # base0D
    magenta: "#a24030" # base0E
    white: "#f15c99" # base05

  normal:
    black: "#ffbee3" # base03
    red: "#b00b69" # base08
    yellow: "#ffcc00" # base0A
    green: "#9ddf69" # base0B
