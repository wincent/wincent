# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Github Light Colorblind by Tinted Theming (https://github.com/tinted-theming)

name: Base16 Github Light Colorblind
accent: "#8250df" # base0D
cursor: "#424a53" # base05
background: "#ffffff" # base00
foreground: "#424a53" # base05
details: lighter

terminal_colors:
  bright:
    black: "#ffffff" # base00
    red: "#8a4600" # base08
    yellow: "#bf8700" # base0A
    green: "#0a3069" # base0B
    cyan: "#0550ae" # base0C
    blue: "#8250df" # base0D
    magenta: "#b35900" # base0E
    white: "#424a53" # base05

  normal:
    black: "#8c959f" # base03
    red: "#8a4600" # base08
    yellow: "#bf8700" # base0A
    green: "#0a3069" # base0B
    cyan: "#0550ae" # base0C
    blue: "#8250df" # base0D
    magenta: "#b35900" # base0E
    white: "#24292f" # base07
