# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Equilibrium Dark by Carlo Abelli

name: Base16 Equilibrium Dark
accent: "#008dd1" # base0D
cursor: "#afaba2" # base05
background: "#0c1118" # base00
foreground: "#afaba2" # base05
details: darker

terminal_colors:
  bright:
    black: "#0c1118" # base00
    red: "#f04339" # base08
