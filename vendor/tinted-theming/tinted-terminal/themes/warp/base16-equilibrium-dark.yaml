    green: "#7f8b00" # base0B
    cyan: "#00948b" # base0C
    blue: "#008dd1" # base0D
    magenta: "#6a7fd2" # base0E
    white: "#afaba2" # base05

  normal:
    black: "#7b776e" # base03
    red: "#f04339" # base08
    yellow: "#bb8801" # base0A
    green: "#7f8b00" # base0B
