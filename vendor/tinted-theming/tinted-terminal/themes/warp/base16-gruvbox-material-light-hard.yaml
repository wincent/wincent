# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Gruvbox Material Light, Hard by Mayush Kumar (https://github.com/MayushKumar), sainnhe (https://github.com/sainnhe/gruvbox-material-vscode)

name: Base16 Gruvbox Material Light, Hard
accent: "#45707a" # base0D
cursor: "#654735" # base05
background: "#f9f5d7" # base00
foreground: "#654735" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f9f5d7" # base00
    red: "#c14a4a" # base08
    yellow: "#b47109" # base0A
    green: "#6c782e" # base0B
    cyan: "#4c7a5d" # base0C
    blue: "#45707a" # base0D
    magenta: "#945e80" # base0E
    white: "#654735" # base05

  normal:
    black: "#a89984" # base03
    red: "#c14a4a" # base08
    yellow: "#b47109" # base0A
    green: "#6c782e" # base0B
    cyan: "#4c7a5d" # base0C
    blue: "#45707a" # base0D
    magenta: "#945e80" # base0E
    white: "#282828" # base07
