# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Mexico Light by Sheldon Johnson

name: Base16 Mexico Light
accent: "#7cafc2" # base0D
cursor: "#383838" # base05
background: "#f8f8f8" # base00
foreground: "#383838" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f8f8f8" # base00
    red: "#ab4642" # base08
    yellow: "#f79a0e" # base0A
    green: "#538947" # base0B
    cyan: "#4b8093" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#96609e" # base0E
    white: "#383838" # base05

  normal:
    black: "#b8b8b8" # base03
    red: "#ab4642" # base08
    yellow: "#f79a0e" # base0A
    green: "#538947" # base0B
    cyan: "#4b8093" # base0C
    blue: "#7cafc2" # base0D
    magenta: "#96609e" # base0E
    white: "#181818" # base07
