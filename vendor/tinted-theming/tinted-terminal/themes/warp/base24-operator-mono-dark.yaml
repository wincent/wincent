# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Operator Mono Dark by FredHappyface (https://github.com/fredHappyface)

name: Base24 Operator Mono Dark
accent: "#4387cf" # base0D
cursor: "#c0c4c0" # base05
background: "#191919" # base00
foreground: "#c0c4c0" # base05
details: darker

terminal_colors:
  normal:
    black: "#191919" # base00
    red: "#ca372d" # base08
    yellow: "#89d3f6" # base0A
    green: "#4d7b3a" # base0B
    cyan: "#72d4c6" # base0C
    blue: "#4387cf" # base0D
    magenta: "#b86cb4" # base0E
    white: "#c0c4c0" # base05

  bright:
    black: "#a6a8a6" # base03
    red: "#c37d62" # base12
    yellow: "#fdfdc5" # base13
    green: "#83d0a2" # base14
    cyan: "#82e9da" # base15
    blue: "#89d3f6" # base16
    magenta: "#fe2c79" # base17
    white: "#fdfdf6" # base07
