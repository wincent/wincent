# Tinted Terminal base16 color theme (https://github.com/tinted-theming)
# Color scheme: Humanoid light by Thomas (tasmo) Friese

name: Base16 Humanoid light
accent: "#0082c9" # base0D
cursor: "#232629" # base05
background: "#f8f8f2" # base00
foreground: "#232629" # base05
details: lighter

terminal_colors:
  bright:
    black: "#f8f8f2" # base00
