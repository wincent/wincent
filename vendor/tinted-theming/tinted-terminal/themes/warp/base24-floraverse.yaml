# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Floraverse by FredHappyface (https://github.com/fredHappyface)

name: Base24 Floraverse
accent: "#1d6da1" # base0D
cursor: "#c3af9d" # base05
background: "#0e0c15" # base00
foreground: "#c3af9d" # base05
details: darker

terminal_colors:
  normal:
    black: "#0e0c15" # base00
    red: "#64002c" # base08
    yellow: "#40a4cf" # base0A
    green: "#5d731a" # base0B
    cyan: "#42a38c" # base0C
    blue: "#1d6da1" # base0D
    magenta: "#b7077e" # base0E
    white: "#c3af9d" # base05

  bright:
    black: "#634e67" # base03
    red: "#d02063" # base12
    yellow: "#fac357" # base13
    green: "#b4ce59" # base14
    cyan: "#62caa8" # base15
    blue: "#40a4cf" # base16
    magenta: "#f12aae" # base17
    white: "#fff5db" # base07
