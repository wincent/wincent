# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Catppuccin Macchiato by https://github.com/catppuccin/catppuccin

name: Base24 Catppuccin Macchiato
accent: "#8aadf4" # base0D
cursor: "#cad3f5" # base05
background: "#24273a" # base00
foreground: "#cad3f5" # base05
details: darker

terminal_colors:
  normal:
    black: "#24273a" # base00
    red: "#ed8796" # base08
    yellow: "#eed49f" # base0A
    green: "#a6da95" # base0B
    cyan: "#8bd5ca" # base0C
    blue: "#8aadf4" # base0D
    magenta: "#c6a0f6" # base0E
    white: "#cad3f5" # base05

  bright:
    black: "#494d64" # base03
    red: "#ee99a0" # base12
    yellow: "#f4dbd6" # base13
    green: "#a6da95" # base14
    cyan: "#91d7e3" # base15
    blue: "#7dc4e4" # base16
    magenta: "#f5bde6" # base17
    white: "#b7bdf8" # base07
