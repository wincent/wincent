# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Obsidian by FredHappyface (https://github.com/fredHappyface)

name: Base24 Obsidian
accent: "#399bda" # base0D
cursor: "#a1a1a1" # base05
background: "#273032" # base00
foreground: "#a1a1a1" # base05
details: darker

terminal_colors:
  normal:
    black: "#273032" # base00
    red: "#a50001" # base08
    yellow: "#a0d6ff" # base0A
    green: "#00bb00" # base0B
    cyan: "#00bbbb" # base0C
    blue: "#399bda" # base0D
    magenta: "#bb00bb" # base0E
    white: "#a1a1a1" # base05

  bright:
    black: "#6e6e6e" # base03
    red: "#ff0003" # base12
    yellow: "#fef773" # base13
    green: "#92c763" # base14
    cyan: "#55ffff" # base15
    blue: "#a0d6ff" # base16
    magenta: "#ff55ff" # base17
    white: "#ffffff" # base07
