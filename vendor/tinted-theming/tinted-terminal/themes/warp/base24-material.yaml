# Tinted Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: Material by FredHappyface (https://github.com/fredHappyface)

name: Base24 Material
accent: "#134eb2" # base0D
cursor: "#c3c3c3" # base05
background: "#eaeaea" # base00
foreground: "#c3c3c3" # base05
details: lighter

terminal_colors:
  normal:
    black: "#eaeaea" # base00
    red: "#b7141e" # base08
    yellow: "#53a4f3" # base0A
    green: "#457b23" # base0B
    cyan: "#0e707c" # base0C
    blue: "#134eb2" # base0D
    magenta: "#550087" # base0E
    white: "#c3c3c3" # base05

  bright:
    black: "#6d6d6d" # base03
    red: "#e83a3f" # base12
    yellow: "#fee92e" # base13
    green: "#7aba39" # base14
    cyan: "#26bad1" # base15
    blue: "#53a4f3" # base16
    magenta: "#a94dbb" # base17
    white: "#d8d8d8" # base07
