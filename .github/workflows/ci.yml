# Based on: https://github.com/actions/starter-workflows/blob/master/ci/node.js.yml

name: ci

on:
  push:
    branches: [main, next, pu]
  pull_request:
    branches: [main, next, pu]

jobs:
  check-licenses:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.14.1]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: bin/check-licenses
        run: bin/check-licenses

  check-lockfile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.14.1]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: bin/npm clean-install

  dprint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.14.1]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: bin/npm clean-install
        run: bin/npm clean-install
      - name: bin/npm exec dprint check
        run: bin/npm exec dprint check

  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --allow-hidden --check .
          version: "2.1.0"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.14.1]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: bin/npm clean-install
        run: bin/npm clean-install
      - name: bin/typegen
        run: bin/typegen
      - name: bin/test
        run: bin/test
